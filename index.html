// METAL HAT POWERUP
// ============================================================
const METAL_DURATION = 7;
const HAT_SIZE = 20;
let metalHat = null;
let hatSpawnTimer = 0;

function spawnMetalHat() {
  const x = PLATFORM_X + 40 + Math.random() * (PLATFORM_W - 80);
  metalHat = {
    x,
    y: -HAT_SIZE,
    vy: 60 + Math.random() * 40,
    bobTimer: Math.random() * Math.PI * 2,
    landed: false,
    landY: 0
  };
}

function updateMetalHat(dt) {
  if (!metalHat) {
    // Spawn chance: once every ~20s on average, only during combat
    hatSpawnTimer -= dt;
    if (hatSpawnTimer <= 0 && (enemies.length > 0 || (boss && !boss.dying))) {
      hatSpawnTimer = 15 + Math.random() * 10;
      spawnMetalHat();
    }
    return;
  }

  const hat = metalHat;

  if (!hat.landed) {
    hat.y += hat.vy * dt;
    // Land on platform
    if (hat.y + HAT_SIZE >= PLATFORM_Y) {
      hat.y = PLATFORM_Y - HAT_SIZE;
      hat.landed = true;
      hat.landY = hat.y;
    }
  } else {
    // Bob gently
    hat.bobTimer += dt * 3;
    hat.y = hat.landY + Math.sin(hat.bobTimer) * 3;
  }

  // Pickup collision (rect overlap — center distance fails because player is tall)
  const pcx = player.x + PLAYER_W / 2;
  const pcy = player.y + PLAYER_H / 2;
  if (rectsOverlap(player.x, player.y, PLAYER_W, PLAYER_H, hat.x - 4, hat.y - 4, HAT_SIZE + 8, HAT_SIZE + 8)) {
    player.metalTimer = METAL_DURATION;
    metalHat = null;
    spawnParticles(pcx, pcy, '#ccddff', 20, 150, 0.5);
    spawnParticles(pcx, pcy, '#ffffff', 10, 100, 0.4);
    addShake(5, 0.15);
    playVoice('win', true);
    playSound('roundStart');
  }
}

function drawMetalHat() {
  if (!metalHat) return;
  const hat = metalHat;
  const x = hat.x;
  const y = hat.y;

  ctx.save();
  ctx.shadowColor = '#88aaff';
  ctx.shadowBlur = 15;

  if (metalHatSpriteLoaded) {
    ctx.drawImage(metalHatSprite, x, y, HAT_SIZE, HAT_SIZE);
  } else {
    // Procedural fallback
    const glowAlpha = 0.3 + 0.15 * Math.sin(performance.now() * 0.005);
    // Hat brim
    ctx.fillStyle = '#889';
    ctx.fillRect(x - 3, y + HAT_SIZE - 5, HAT_SIZE + 6, 5);
    // Hat dome
    ctx.fillStyle = '#aab';
    ctx.beginPath();
    ctx.ellipse(x + HAT_SIZE / 2, y + HAT_SIZE - 6, HAT_SIZE * 0.4, HAT_SIZE * 0.6, 0, Math.PI, 0);
    ctx.fill();
    // Shine
    ctx.fillStyle = `rgba(200,220,255,${glowAlpha})`;
    ctx.fillRect(x + 4, y + 4, 4, 6);
  }

  ctx.restore();
}

// ============================================================
// BLUEBERRY SMOOTHIE POWERUP
// ============================================================
const MUSCLE_DURATION = 6;
const SMOOTHIE_SIZE = 18;
let smoothie = null;
let smoothieSpawnTimer = 20 + Math.random() * 10;

function spawnSmoothie() {
  const x = PLATFORM_X + 40 + Math.random() * (PLATFORM_W - 80);
  smoothie = {
    x,
    y: -SMOOTHIE_SIZE,
    vy: 50 + Math.random() * 40,
    bobTimer: Math.random() * Math.PI * 2,
    landed: false,
    landY: 0
  };
}

function updateSmoothie(dt) {
  if (!smoothie) {
    smoothieSpawnTimer -= dt;
    if (smoothieSpawnTimer <= 0 && (enemies.length > 0 || (boss && !boss.dying))) {
      smoothieSpawnTimer = 20 + Math.random() * 10;
      spawnSmoothie();
    }
    return;
  }

  const s = smoothie;

  if (!s.landed) {
    s.y += s.vy * dt;
    if (s.y + SMOOTHIE_SIZE >= PLATFORM_Y) {
      s.y = PLATFORM_Y - SMOOTHIE_SIZE;
      s.landed = true;
      s.landY = s.y;
    }
  } else {
    s.bobTimer += dt * 3;
    s.y = s.landY + Math.sin(s.bobTimer) * 3;
  }

  // Pickup collision (rect overlap — center distance fails because player is tall)
  const pcx = player.x + PLAYER_W / 2;
  const pcy = player.y + PLAYER_H / 2;
  if (rectsOverlap(player.x, player.y, PLAYER_W, PLAYER_H, s.x - 4, s.y - 4, SMOOTHIE_SIZE + 8, SMOOTHIE_SIZE + 8)) {
    player.muscleTimer = MUSCLE_DURATION;
    player.slamCooldown = 0;
    smoothie = null;
    spawnParticles(pcx, pcy, '#cc66ff', 20, 150, 0.5);
    spawnParticles(pcx, pcy, '#8844ff', 10, 100, 0.4);
    addShake(5, 0.15);
    playVoice('win', true);
    playSound('smoothiePickup');
  }
}

function drawSmoothie() {
  if (!smoothie) return;
  const s = smoothie;
  const x = s.x;
  const y = s.y;
  const sz = SMOOTHIE_SIZE;

  ctx.save();
  ctx.shadowColor = '#aa66ff';
  ctx.shadowBlur = 15;

  if (smoothieSpriteLoaded) {
    ctx.drawImage(smoothieSprite, x, y, sz, sz);
  } else {
    // Procedural fallback
    const glowAlpha = 0.3 + 0.15 * Math.sin(performance.now() * 0.005);
    // Cup body (blue-purple gradient look)
    ctx.fillStyle = '#6633cc';
    ctx.fillRect(x + 2, y + sz * 0.3, sz - 4, sz * 0.65);
    // Cup top (lighter)
    ctx.fillStyle = '#8855ee';
    ctx.fillRect(x + 1, y + sz * 0.25, sz - 2, sz * 0.15);
    // Smoothie surface (blueberry color)
    ctx.fillStyle = '#5522aa';
    ctx.fillRect(x + 3, y + sz * 0.3, sz - 6, sz * 0.1);
    // Cup bottom (slightly narrower)
    ctx.fillStyle = '#5528bb';
    ctx.fillRect(x + 3, y + sz * 0.85, sz - 6, sz * 0.1);

    // Straw
    ctx.strokeStyle = '#ffccee';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + sz * 0.6, y + sz * 0.3);
    ctx.lineTo(x + sz * 0.7, y);
    ctx.stroke();

    // Glow highlight
    ctx.fillStyle = `rgba(180,140,255,${glowAlpha})`;
    ctx.fillRect(x + 4, y + sz * 0.35, 3, 5);
  }

  ctx.restore();
}

// ============================================================
// WAVE SYSTEM
// ============================================================
let waveEnemiesRemaining = 0;
let waveSpawnTimer = 0;
let waveEnemiesSpawned = 0;
let waveEnemiesTotal = 0;

function startRound(r) {
  round = r;
  if (isBossRound(r)) {
    waveEnemiesTotal = 0;
    waveEnemiesSpawned = 0;
    waveEnemiesRemaining = 0;
    waveSpawnTimer = 0;
    boss = createBoss(r);
    bossActive = true;
    bossEntering = true;
    bossDefeated = false;
    playSound('bossRoar');
  } else {
    waveEnemiesTotal = 3 + r * 3;
    waveEnemiesSpawned = 0;
    waveEnemiesRemaining = waveEnemiesTotal;
    waveSpawnTimer = 0;
  }
  // Reset floating platforms
  floatingPlatforms = [];
  occupiedSlots = new Set();
  floatPlatSpawnTimer = 3.0;
  playSound('roundStart');
}

function updateWaves(dt) {
  if (gameState !== 'playing') return;

  // Boss round: check for boss defeated
  if (bossActive) {
    if (bossDefeated) {
      enemyProjectiles = [];
      gameState = 'roundTransition';
      transitionTimer = 2.0;
      playVoice('win', true);
    }
    return;
  }

  // Spawn enemies
  const spawnInterval = Math.max(0.4, 1.5 - round * 0.1);
  if (waveEnemiesSpawned < waveEnemiesTotal) {
    waveSpawnTimer -= dt;
    if (waveSpawnTimer <= 0) {
      spawnEnemyForRound(round);
      waveEnemiesSpawned++;
      waveSpawnTimer = spawnInterval;
    }
  }

  // Check round completion: all spawned and all dead/off-screen
  const aliveEnemies = enemies.filter(e => !e.dying).length;
  if (waveEnemiesSpawned >= waveEnemiesTotal && aliveEnemies === 0) {
    // Clear any remaining enemy projectiles
    enemyProjectiles = [];
    gameState = 'roundTransition';
    transitionTimer = 2.0;
    // Voice clip: milestone rounds get "win", others get alternating "good"
    if (round % 5 === 0) {
      playVoice('win', true);
    } else {
      playVoice(goodClipToggle ? 'good1' : 'good2');
      goodClipToggle = !goodClipToggle;
    }
  }
}

// ============================================================
// UTILITY
// ============================================================
function rectsOverlap(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  // HP Bar
  const barX = 12, barY = 12, barW = 140, barH = 16;
  ctx.fillStyle = '#330000';
  ctx.fillRect(barX, barY, barW, barH);
  const hpRatio = Math.max(0, player.hp / PLAYER_MAX_HP);
  const hpColor = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#cccc22' : '#cc2222';
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX, barY, barW * hpRatio, barH);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY, barW, barH);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`HP: ${Math.max(0, Math.ceil(player.hp))}/${PLAYER_MAX_HP}`, barX + 4, barY + 12);

  // Round
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc44';
  ctx.fillText(`ROUND ${round}`, W / 2, 22);

  // Enemy count
  if (bossActive) {
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = '#ff4444';
    ctx.fillText('BOSS FIGHT', W / 2, 40);
  } else {
    const alive = enemies.filter(e => !e.dying).length;
    const remaining = (waveEnemiesTotal - waveEnemiesSpawned) + alive;
    ctx.font = '12px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText(`Enemies: ${remaining}`, W / 2, 40);
  }

  // Score
  ctx.textAlign = 'right';
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Score: ${score}`, W - 12, 22);

  // Metal mode indicator
  if (player.metalTimer > 0) {
    const barW = 100;
    const barH = 10;
    const bx = W / 2 - barW / 2;
    const by = 50;
    const ratio = player.metalTimer / METAL_DURATION;
    ctx.fillStyle = '#223';
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = ratio < 0.3 ? '#667' : '#aabbdd';
    ctx.fillRect(bx, by, barW * ratio, barH);
    ctx.strokeStyle = '#88aaff';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, barW, barH);
    ctx.textAlign = 'center';
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = '#ddeeff';
    ctx.fillText('METAL', W / 2, by + 10);
  }

  // Muscle mode indicator
  if (player.muscleTimer > 0) {
    const mBarW = 100;
    const mBarH = 10;
    const mbx = W / 2 - mBarW / 2;
    // Offset down if metal is also active
    const mby = player.metalTimer > 0 ? 64 : 50;
    const mRatio = player.muscleTimer / MUSCLE_DURATION;
    ctx.fillStyle = '#221133';
    ctx.fillRect(mbx, mby, mBarW, mBarH);
    ctx.fillStyle = mRatio < 0.3 ? '#664488' : '#bb66ff';
    ctx.fillRect(mbx, mby, mBarW * mRatio, mBarH);
    ctx.strokeStyle = '#aa66ff';
    ctx.lineWidth = 1;
    ctx.strokeRect(mbx, mby, mBarW, mBarH);
    ctx.textAlign = 'center';
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = '#eeccff';
    ctx.fillText('MUSCLE', W / 2, mby + 10);
  }

  // Snot rocket cooldown / charge indicator
  if (player.snotHolding) {
    // Show charge bar while holding
    const sBarW = 80;
    const sBarH = 8;
    const sbx = W - sBarW - 12;
    const sby = 36;
    const chargeRatio = Math.min(player.snotChargeTime / SNOT_MAX_CHARGE, 1);
    ctx.fillStyle = '#1a2210';
    ctx.fillRect(sbx, sby, sBarW, sBarH);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(sbx, sby, sBarW * chargeRatio, sBarH);
    ctx.strokeStyle = '#88cc22';
    ctx.lineWidth = 1;
    ctx.strokeRect(sbx, sby, sBarW, sBarH);
    ctx.textAlign = 'right';
    ctx.font = 'bold 8px monospace';
    ctx.fillStyle = '#ffcc00';
    ctx.fillText('AIMING...', sbx + sBarW, sby + 7);
  } else if (player.snotCooldown > 0) {
    const sBarW = 80;
    const sBarH = 8;
    const sbx = W - sBarW - 12;
    const sby = 36;
    const sRatio = 1 - player.snotCooldown / SNOT_COOLDOWN;
    ctx.fillStyle = '#1a2210';
    ctx.fillRect(sbx, sby, sBarW, sBarH);
    ctx.fillStyle = sRatio >= 1 ? '#88cc22' : '#556622';
    ctx.fillRect(sbx, sby, sBarW * sRatio, sBarH);
    ctx.strokeStyle = '#88cc22';
    ctx.lineWidth = 1;
    ctx.strokeRect(sbx, sby, sBarW, sBarH);
    ctx.textAlign = 'right';
    ctx.font = 'bold 8px monospace';
    ctx.fillStyle = '#aaddaa';
    ctx.fillText('SNOT', sbx + sBarW, sby + 7);
  } else {
    // Ready indicator — "HOLD TO AIM"
    ctx.textAlign = 'right';
    ctx.font = 'bold 8px monospace';
    const readyPulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.006);
    ctx.fillStyle = `rgba(136,204,34,${readyPulse})`;
    ctx.fillText(isMobile ? 'SNOT: HOLD TO AIM' : 'SNOT [Q]: HOLD TO AIM', W - 12, 43);
  }
}

// ============================================================
// GAME STATE SCREENS
// ============================================================
function drawTitleScreen() {
  const cy = H * 0.12;
  // Big title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 42px monospace';
  ctx.fillText('EGGTHONY', W / 2, cy);

  ctx.fillStyle = '#4488ff';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('Lightning Egg', W / 2, cy + 38);

  // Draw Eggthony (big)
  if (spriteLoaded) {
    ctx.drawImage(eggSprite, W / 2 - 60, cy + 50, 120, 274);
  }

  // Controls
  ctx.fillStyle = '#ccc';
  ctx.font = '14px monospace';
  const controls = [
    ...(isMobile ? [
      'Drag left side to move',
      'JUMP button to jump',
      'Hold ZAP to shoot (auto-aims)',
      'HOLD SNOT to aim booger mortar, release!',
    ] : [
      'WASD - Move / Jump',
      'Click - Shoot lightning toward cursor',
      'HOLD Q/E - Aim snot mortar, release to fire!',
    ])
  ];
  const ctrlY = cy + 350;
  controls.forEach((line, i) => {
    ctx.fillText(line, W / 2, ctrlY + i * 24);
  });

  // Blink
  titleBlink += 0.03;
  const alpha = 0.5 + 0.5 * Math.sin(titleBlink * 3);
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.font = 'bold 20px monospace';
  ctx.fillText(isMobile ? 'Tap to Start' : 'Click to Start', W / 2, PLATFORM_Y - 40);
}

function drawRoundTransition() {
  ctx.textAlign = 'center';
  ctx.fillStyle = '#44ff44';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(`ROUND ${round} COMPLETE!`, W / 2, H / 2 - 30);

  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(`Round ${round + 1} incoming...`, W / 2, H / 2 + 15);

  // Show theme name announcement if crossing a boundary
  const nextThemeIdx = getThemeIndex(round + 1);
  if (nextThemeIdx !== currentThemeIndex) {
    const nextTheme = THEMES[nextThemeIdx];
    const pulse = 0.7 + 0.3 * Math.sin(performance.now() * 0.005);
    const themeColors = {
      'SPACE STATION': `rgba(100,160,255,${pulse})`,
      'XENO JUNGLE': `rgba(80,255,100,${pulse})`,
      'VOLCANIC CORE': `rgba(255,120,40,${pulse})`
    };
    ctx.fillStyle = themeColors[nextTheme.name] || '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.fillText(`~ ${nextTheme.name} ~`, W / 2, H / 2 + 95);
  }

  // Show score
  ctx.fillStyle = '#fff';
  ctx.font = '20px monospace';
  ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 60);

  // Boss battle warning
  if (isBossRound(round + 1)) {
    const pulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.008);
    ctx.fillStyle = `rgba(255,40,40,${pulse})`;
    ctx.font = 'bold 26px monospace';
    ctx.fillText('! BOSS BATTLE !', W / 2, H / 2 + 130);
  }
}

function drawGameOver() {
  ctx.textAlign = 'center';

  // Dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 44px monospace';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 60);

  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(`Score: ${score}`, W / 2, H / 2);

  ctx.fillStyle = '#fff';
  ctx.font = '20px monospace';
  ctx.fillText(`Reached Round ${round}`, W / 2, H / 2 + 40);

  if (gameOverCooldown <= 0) {
    titleBlink += 0.03;
    const alpha = 0.5 + 0.5 * Math.sin(titleBlink * 3);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = 'bold 22px monospace';
    ctx.fillText(isMobile ? 'Tap to Restart' : 'Click to Restart', W / 2, H / 2 + 100);
  }
}

// ============================================================
// CLICK HANDLER (state transitions)
// ============================================================
canvas.addEventListener('click', () => {
  ensureAudio();
  if (gameState === 'title') {
    gameState = 'playing';
    playVoice('start', true);
    score = 0;
    round = 1;
    enemies = [];
    enemyProjectiles = [];
    lightningBolts = [];
    particles = [];
    damageNumbers = [];
    metalHat = null;
    hatSpawnTimer = 15 + Math.random() * 10;
    smoothie = null;
    smoothieSpawnTimer = 20 + Math.random() * 10;
    boss = null;
    bossActive = false;
    bossEntering = false;
    bossDefeated = false;
    bossHPBarFlash = 0;
    snotRocket = null;
    floatingPlatforms = [];
    occupiedSlots = new Set();
    floatPlatSpawnTimer = 3.0;
    currentThemeIndex = 0;
    themeFadeAlpha = 0;
    themeFading = false;
    themeAnnouncement = '';
    initAmbientParticles();
    initBgDetails();
    resetPlayer();
    startRound(1);
  } else if (gameState === 'gameOver' && gameOverCooldown <= 0) {
    gameState = 'playing';
    score = 0;
    round = 1;
    enemies = [];
    enemyProjectiles = [];
    lightningBolts = [];
    particles = [];
    damageNumbers = [];
    metalHat = null;
    hatSpawnTimer = 15 + Math.random() * 10;
    smoothie = null;
    smoothieSpawnTimer = 20 + Math.random() * 10;
    boss = null;
    bossActive = false;
    bossEntering = false;
    bossDefeated = false;
    bossHPBarFlash = 0;
    snotRocket = null;
    floatingPlatforms = [];
    occupiedSlots = new Set();
    floatPlatSpawnTimer = 3.0;
    currentThemeIndex = 0;
    themeFadeAlpha = 0;
    themeFading = false;
    themeAnnouncement = '';
    initAmbientParticles();
    initBgDetails();
    resetPlayer();
    startRound(1);
  }
});

// ============================================================
// MAIN GAME LOOP (fixed timestep)
// ============================================================
const TICK_RATE = 1 / 60;
let accumulator = 0;
let lastTime = performance.now();

function gameLoop(now) {
  requestAnimationFrame(gameLoop);

  let dt = (now - lastTime) / 1000;
  lastTime = now;
  if (dt > 0.1) dt = 0.1; // Clamp large spikes

  accumulator += dt;

  while (accumulator >= TICK_RATE) {
    update(TICK_RATE);
    accumulator -= TICK_RATE;
  }

  draw();
}

function update(dt) {
  updateAmbientParticles(dt);
  updateParticles(dt);
  updateDamageNumbers(dt);

  // Theme fade transition
  if (themeFading) {
    themeFadeAlpha += dt * 3; // fade to black over ~0.33s
    if (themeFadeAlpha >= 1) {
      themeFadeAlpha = 1;
      // Swap theme now
      const newIdx = getThemeIndex(round);
      if (newIdx !== currentThemeIndex) {
        currentThemeIndex = newIdx;
        initAmbientParticles();
        initBgDetails();
      }
      themeFading = false;
    }
  } else if (themeFadeAlpha > 0) {
    themeFadeAlpha -= dt * 2; // fade back in over ~0.5s
    if (themeFadeAlpha < 0) themeFadeAlpha = 0;
  }

  // Screen shake decay
  if (shakeDuration > 0) {
    shakeDuration -= dt;
    shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
    shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
    shakeIntensity *= 0.9;
  } else {
    shakeX = 0; shakeY = 0; shakeIntensity = 0;
  }

  if (gameOverCooldown > 0) gameOverCooldown -= dt;

  if (gameState === 'paused') return;

  if (gameState === 'playing') {
    updatePlayer(dt);
    updateEnemies(dt);
    updateLightning(dt);
    updateBoss(dt);
    updateSnotRocket(dt);
    updateMetalHat(dt);
    updateSmoothie(dt);
    updateWaves(dt);
    updateFloatingPlatforms(dt);

    // Check death
    if (player.hp <= 0) {
      gameState = 'gameOver';
      gameOverCooldown = 1.5;
      spawnParticles(player.x + PLAYER_W / 2, player.y + PLAYER_H / 2, '#f5e6c8', 30, 300, 1.0);
      addShake(12, 0.4);
      playSound('gameOver');
      playNoise(0.3, 0.2);
      playVoice('lose', true);
    }

    // "Bad" voice when HP drops below 25% (once per life)
    if (!lowHpTriggered && player.hp > 0 && player.hp <= PLAYER_MAX_HP * 0.25) {
      lowHpTriggered = true;
      playVoice('bad', true);
    }
  } else if (gameState === 'roundTransition') {
    transitionTimer -= dt;
    if (transitionTimer <= 0) {
      const prevThemeIdx = currentThemeIndex;
      round++;
      const newThemeIdx = getThemeIndex(round);
      // Check if we're crossing a theme boundary
      if (newThemeIdx !== prevThemeIdx) {
        themeAnnouncement = THEMES[newThemeIdx].name;
        themeFading = true;
        themeFadeAlpha = 0;
      }
      // Heal player a bit (more after boss fights)
      const healAmount = isBossRound(round) ? 50 : 20;
      player.hp = Math.min(PLAYER_MAX_HP, player.hp + healAmount);
      startRound(round);
      gameState = 'playing';
    }
  }
}

function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background
  drawBackground();
  drawPlatform();
  drawFloatingPlatforms();

  if (gameState === 'title') {
    drawTitleScreen();
  } else {
    drawMetalHat();
    drawSmoothie();
    drawEnemies();
    drawBoss();
    drawPlayer();
    drawSnotCharging();
    drawLightning();
    drawSnotRocket();
    drawParticles();
    drawDamageNumbers();
    drawHUD();
    drawBossHPBar();
    if (isMobile && window.drawTouchHUD) window.drawTouchHUD();

    if (gameState === 'paused') {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 40px monospace';
      ctx.fillText('PAUSED', W / 2, H / 2 - 10);
      ctx.font = '16px monospace';
      ctx.fillStyle = '#aaa';
      ctx.fillText('Press ESC to resume', W / 2, H / 2 + 30);
    } else if (gameState === 'roundTransition') {
      drawRoundTransition();
    } else if (gameState === 'gameOver') {
      drawGameOver();
    }
  }

  // Theme fade-to-black overlay
  if (themeFadeAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${themeFadeAlpha})`;
    ctx.fillRect(-10, -10, W + 20, H + 20);
  }

  ctx.restore();
}

// Start the loop
requestAnimationFrame(gameLoop);
</script>
