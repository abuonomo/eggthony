<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Eggthony: Lightning Egg</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #000;
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  user-select: none;
  -webkit-user-select: none;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
}
canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor: crosshair;
  touch-action: none;
  /* filled dynamically by JS */
}
@media (pointer: coarse) {
  canvas { cursor: default; }
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// EGGTHONY: LIGHTNING EGG
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Dynamic sizing: fill viewport, pick internal resolution to match aspect ratio
function resizeCanvas() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  canvas.style.width = vw + 'px';
  canvas.style.height = vh + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Internal game resolution — portrait-first (9:16ish)
const W = 480, H = 854;

canvas.width = W;
canvas.height = H;

// Prevent right-click context menu
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
// AUDIO ENGINE (Web Audio API - procedural SFX)
// ============================================================
let audioCtx = null;
let audioUnlocked = false;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Unlock HTML Audio elements on first interaction (autoplay policy)
  if (!audioUnlocked) {
    audioUnlocked = true;
    for (const clip of [...Object.values(voiceClips), snotSniffleClip, snotLaunchClip]) {
      clip.play().then(() => { clip.pause(); clip.currentTime = 0; }).catch(() => {});
    }
  }
}

function playSound(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch (type) {
    case 'punch':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.15);
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
      break;
    case 'lightning':
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, t);
      osc.frequency.exponentialRampToValueAtTime(200, t + 0.1);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t); osc.stop(t + 0.1);
      break;
    case 'hit':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.08);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.start(t); osc.stop(t + 0.08);
      break;
    case 'kill':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.3);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
      break;
    case 'hurt':
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.linearRampToValueAtTime(100, t + 0.2);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.start(t); osc.stop(t + 0.2);
      break;
    case 'roundStart':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, t);
      osc.frequency.setValueAtTime(550, t + 0.1);
      osc.frequency.setValueAtTime(660, t + 0.2);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
      break;
    case 'gameOver':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.linearRampToValueAtTime(50, t + 0.8);
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc.start(t); osc.stop(t + 0.8);
      break;
    case 'spitterShoot':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(300, t + 0.12);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      osc.start(t); osc.stop(t + 0.12);
      break;
    case 'slam':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.2);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.start(t); osc.stop(t + 0.2);
      break;
    case 'smoothiePickup':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(330, t);
      osc.frequency.setValueAtTime(440, t + 0.08);
      osc.frequency.setValueAtTime(550, t + 0.16);
      osc.frequency.setValueAtTime(660, t + 0.24);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
      break;
    case 'bossRoar':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(80, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.5);
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t); osc.stop(t + 0.5);
      break;
    case 'bossSlam':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(60, t);
      osc.frequency.exponentialRampToValueAtTime(20, t + 0.3);
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
      break;
    case 'bossDeath':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(20, t + 1.0);
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
      osc.start(t); osc.stop(t + 1.0);
      break;
    case 'platAppear':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(400, t + 0.15);
      gain.gain.setValueAtTime(0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t); osc.stop(t + 0.15);
      break;
    case 'platCrumble':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.start(t); osc.stop(t + 0.2);
      break;
  }
}

// Noise burst for explosions
function playNoise(duration, volume) {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * volume;
  const source = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  source.buffer = buffer;
  source.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  source.start();
}

// ============================================================
// VOICE CLIPS (from data/sounds/)
// ============================================================
const voiceClips = {
  bad: new Audio(encodeURI('data/sounds/Bad - Freakin dilbert.m4a')),
  good1: new Audio(encodeURI('data/sounds/Good - bobert mcdoobenger.m4a')),
  good2: new Audio(encodeURI('data/sounds/Good - hammanado.m4a')),
  lose: new Audio(encodeURI('data/sounds/Lose - eh maybe next time.m4a')),
  win: new Audio(encodeURI('data/sounds/Win \u2014 let\u2019s freaking go boys.m4a')),
  start: new Audio(encodeURI('data/sounds/Start game trimmed.m4a'))
};
const snotSniffleClip = new Audio(encodeURI('data/sounds/Snot rocket sniffle.m4a'));
snotSniffleClip.preload = 'auto';
snotSniffleClip.loop = true;
const snotLaunchClip = new Audio(encodeURI('data/sounds/Snot rocket launch.m4a'));
snotLaunchClip.preload = 'auto';
for (const [name, clip] of Object.entries(voiceClips)) {
  clip.preload = 'auto';
  clip.addEventListener('error', () => console.warn('Audio load failed:', name, clip.error));
}
let lowHpTriggered = false;
let goodClipToggle = false;
let activeVoice = null;

function isVoicePlaying() {
  return activeVoice && !activeVoice.paused && !activeVoice.ended;
}

function playVoice(name, force) {
  if (!force && isVoicePlaying()) return;
  // Stop any currently playing voice clip
  if (activeVoice) {
    activeVoice.pause();
    activeVoice.currentTime = 0;
  }
  const clip = voiceClips[name];
  if (!clip) return;
  clip.currentTime = 0;
  clip.play().catch(() => {});
  activeVoice = clip;
}

// ============================================================
// SPRITE LOADING
// ============================================================
const eggSprite = new Image();
eggSprite.src = 'data/eggthony.png';
let spriteLoaded = false;
eggSprite.onload = () => { spriteLoaded = true; };

const metalSprite = new Image();
metalSprite.src = 'data/metal_eggthony.png';
let metalSpriteLoaded = false;
metalSprite.onload = () => { metalSpriteLoaded = true; };

const muscleSprite = new Image();
muscleSprite.src = 'data/muscle_eggthony.png';
let muscleSpriteLoaded = false;
muscleSprite.onload = () => { muscleSpriteLoaded = true; };

const evilSprite = new Image();
evilSprite.src = 'data/evil_eggthony.png';
let evilSpriteLoaded = false;
evilSprite.onload = () => { evilSpriteLoaded = true; };

// Strip white backgrounds from sprites (pixels with R/G/B all >= 240 → transparent)
function removeWhiteBG(img, callback) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth;
  c.height = img.naturalHeight;
  const cx = c.getContext('2d');
  cx.drawImage(img, 0, 0);
  const id = cx.getImageData(0, 0, c.width, c.height);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i] >= 240 && d[i + 1] >= 240 && d[i + 2] >= 240) d[i + 3] = 0;
  }
  cx.putImageData(id, 0, 0);
  const out = new Image();
  out.onload = () => callback(out);
  out.src = c.toDataURL();
}

// Enemy & powerup sprites (white-BG stripped at load time)
let gruntSprite = null, gruntSpriteLoaded = false;
let spitterSprite = null, spitterSpriteLoaded = false;
let bruteSprite = null, bruteSpriteLoaded = false;
let metalHatSprite = null, metalHatSpriteLoaded = false;
let smoothieSprite = null, smoothieSpriteLoaded = false;

const spriteFiles = [
  ['data/grunt.png',     (s) => { gruntSprite = s; gruntSpriteLoaded = true; }],
  ['data/spitter.png',   (s) => { spitterSprite = s; spitterSpriteLoaded = true; }],
  ['data/brute.png',     (s) => { bruteSprite = s; bruteSpriteLoaded = true; }],
  ['data/metal_hat.png', (s) => { metalHatSprite = s; metalHatSpriteLoaded = true; }],
  ['data/smoothie.png',  (s) => { smoothieSprite = s; smoothieSpriteLoaded = true; }],
];
for (const [src, cb] of spriteFiles) {
  const raw = new Image();
  raw.onload = () => removeWhiteBG(raw, cb);
  raw.src = src;
}

// ============================================================
// INPUT
// ============================================================
const keys = {};
const mouse = { x: W / 2, y: H / 2, left: false, right: false };

window.addEventListener('keydown', e => {
  ensureAudio();
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'Escape') {
    if (gameState === 'playing') { gameState = 'paused'; }
    else if (gameState === 'paused') { gameState = 'playing'; }
  }
  // Snot rocket hold-to-charge (Q or E)
  const k = e.key.toLowerCase();
  if ((k === 'q' || k === 'e') && gameState === 'playing') {
    if (player.snotCooldown <= 0 && !player.snotHolding && !snotRocket) {
      player.snotHolding = true;
      player.snotChargeTime = 0;
      snotSniffleClip.currentTime = 0;
      snotSniffleClip.play().catch(() => {});
    }
  }
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  // Snot rocket release-to-fire (Q or E)
  const k = e.key.toLowerCase();
  if ((k === 'q' || k === 'e') && player.snotHolding) {
    const chargeRatio = Math.min(player.snotChargeTime / SNOT_MAX_CHARGE, 1);
    player.snotHolding = false;
    player.snotChargeTime = 0;
    snotSniffleClip.pause();
    snotSniffleClip.currentTime = 0;
    snotLaunchClip.currentTime = 0;
    snotLaunchClip.play().catch(() => {});
    fireSnotRocket(chargeRatio);
    player.snotCooldown = SNOT_COOLDOWN;
  }
});
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (W / rect.width);
  mouse.y = (e.clientY - rect.top) * (H / rect.height);
});
canvas.addEventListener('mousedown', e => {
  ensureAudio();
  if (e.button === 0) mouse.left = true;
  if (e.button === 2) mouse.right = true;
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 0) mouse.left = false;
  if (e.button === 2) mouse.right = false;
});

// Mobile touch controls
const isMobile = 'ontouchstart' in window;
if (isMobile) {
  // Prevent default touch behavior on canvas
  canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  // ---- Virtual Joystick (left) + ZAP button (bottom-right) + JUMP button ----
  const JOYSTICK_DEAD = 15;
  const JOYSTICK_MAX = 60;

  // Joystick state
  let joyTouch = null;
  let joyOrigin = null;
  let joyPos = null;

  // Attack button state
  let attackTouch = null;
  // Jump button state
  let jumpTouch = null;
  // Snot button state
  let snotTouch = null;

  // Button positions in canvas coordinates
  const ZAP_BTN = { x: W - 70, y: H - 80, r: 44 };
  const SNOT_BTN = { x: W - 160, y: H - 80, r: 36 };
  const JUMP_BTN = { x: W - 70, y: H - 185, r: 38 };

  function autoAimMouse() {
    const pcx = player.x + PLAYER_W / 2;
    const pcy = player.y + PLAYER_H / 2;
    let nearest = null, nearDist = Infinity;
    for (const en of enemies) {
      if (en.dying) continue;
      const d = Math.hypot(en.x + en.w / 2 - pcx, en.y + en.h / 2 - pcy);
      if (d < nearDist) { nearDist = d; nearest = en; }
    }
    // Include boss as target
    if (boss && bossActive && !boss.dying) {
      const d = Math.hypot(boss.x + boss.w / 2 - pcx, boss.y + boss.h / 2 - pcy);
      if (d < nearDist) { nearDist = d; nearest = boss; }
    }
    if (nearest) {
      mouse.x = nearest.x + nearest.w / 2;
      mouse.y = nearest.y + nearest.h / 2;
    } else {
      mouse.x = player.facingRight ? pcx + 200 : pcx - 200;
      mouse.y = pcy;
    }
  }

  // Convert screen touch coords to canvas coords
  function touchToCanvas(touch) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (touch.clientX - rect.left) * (W / rect.width),
      y: (touch.clientY - rect.top) * (H / rect.height)
    };
  }

  function inCircle(px, py, cx, cy, r) {
    return Math.hypot(px - cx, py - cy) <= r;
  }

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    ensureAudio();

    if (gameState === 'title' || gameState === 'gameOver') {
      canvas.dispatchEvent(new Event('click'));
      return;
    }

    for (const touch of e.changedTouches) {
      const c = touchToCanvas(touch);

      // Check ZAP button first
      if (attackTouch === null && inCircle(c.x, c.y, ZAP_BTN.x, ZAP_BTN.y, ZAP_BTN.r + 10)) {
        attackTouch = touch.identifier;
        autoAimMouse();
        mouse.left = true;
        continue;
      }

      // Check SNOT button (hold to charge)
      if (snotTouch === null && inCircle(c.x, c.y, SNOT_BTN.x, SNOT_BTN.y, SNOT_BTN.r + 10)) {
        snotTouch = touch.identifier;
        if (player.snotCooldown <= 0 && !player.snotHolding && !snotRocket) {
          autoAimMouse();
          player.snotHolding = true;
          player.snotChargeTime = 0;
          snotSniffleClip.currentTime = 0;
          snotSniffleClip.play().catch(() => {});
        }
        continue;
      }

      // Check JUMP button
      if (jumpTouch === null && inCircle(c.x, c.y, JUMP_BTN.x, JUMP_BTN.y, JUMP_BTN.r + 10)) {
        jumpTouch = touch.identifier;
        keys['w'] = true;
        continue;
      }

      // Otherwise: joystick (anywhere on left ~2/3 of screen)
      if (joyTouch === null && c.x < W * 0.65) {
        joyTouch = touch.identifier;
        joyOrigin = { x: touch.clientX, y: touch.clientY };
        joyPos = { x: touch.clientX, y: touch.clientY };
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      if (touch.identifier === joyTouch) {
        joyPos = { x: touch.clientX, y: touch.clientY };
        const dx = joyPos.x - joyOrigin.x;

        if (dx < -JOYSTICK_DEAD) { keys['a'] = true; keys['d'] = false; }
        else if (dx > JOYSTICK_DEAD) { keys['d'] = true; keys['a'] = false; }
        else { keys['a'] = false; keys['d'] = false; }
      }
      if (touch.identifier === attackTouch) {
        autoAimMouse();
      }
    }
  }, { passive: false });

  function endTouch(e) {
    for (const touch of e.changedTouches) {
      if (touch.identifier === joyTouch) {
        joyTouch = null;
        joyOrigin = null;
        joyPos = null;
        keys['a'] = false;
        keys['d'] = false;
      }
      if (touch.identifier === attackTouch) {
        mouse.left = false;
        attackTouch = null;
      }
      if (touch.identifier === jumpTouch) {
        keys['w'] = false;
        jumpTouch = null;
      }
      if (touch.identifier === snotTouch) {
        snotTouch = null;
        if (player.snotHolding) {
          autoAimMouse();
          const chargeRatio = Math.min(player.snotChargeTime / SNOT_MAX_CHARGE, 1);
          player.snotHolding = false;
          player.snotChargeTime = 0;
          snotSniffleClip.pause();
          snotSniffleClip.currentTime = 0;
          snotLaunchClip.currentTime = 0;
          snotLaunchClip.play().catch(() => {});
          fireSnotRocket(chargeRatio);
          player.snotCooldown = SNOT_COOLDOWN;
        }
      }
    }
  }
  canvas.addEventListener('touchend', endTouch, { passive: false });
  canvas.addEventListener('touchcancel', endTouch, { passive: false });

  // Draw touch controls overlay
  window.drawTouchHUD = function() {
    if (gameState !== 'playing' && gameState !== 'paused') return;

    // --- ZAP button ---
    const zapActive = attackTouch !== null;
    ctx.beginPath();
    ctx.arc(ZAP_BTN.x, ZAP_BTN.y, ZAP_BTN.r, 0, Math.PI * 2);
    ctx.fillStyle = zapActive ? 'rgba(68,136,255,0.3)' : 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = zapActive ? 'rgba(68,136,255,0.6)' : 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = zapActive ? '#88bbff' : 'rgba(255,255,255,0.45)';
    ctx.font = 'bold 15px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ZAP', ZAP_BTN.x, ZAP_BTN.y + 5);

    // --- SNOT button ---
    const snotReady = player.snotCooldown <= 0 && !player.snotHolding;
    const snotActive = snotTouch !== null;
    const snotHolding = player.snotHolding;
    ctx.beginPath();
    ctx.arc(SNOT_BTN.x, SNOT_BTN.y, SNOT_BTN.r, 0, Math.PI * 2);
    if (snotHolding) {
      ctx.fillStyle = 'rgba(200,180,30,0.3)';
    } else if (snotReady) {
      ctx.fillStyle = snotActive ? 'rgba(100,200,40,0.3)' : 'rgba(100,200,40,0.1)';
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
    }
    ctx.fill();
    ctx.strokeStyle = snotReady ? 'rgba(100,200,40,0.5)' : (snotHolding ? 'rgba(200,180,30,0.6)' : 'rgba(255,255,255,0.12)');
    ctx.lineWidth = 2;
    ctx.stroke();
    // Charge arc while holding
    if (snotHolding) {
      const chargeRatio = Math.min(player.snotChargeTime / SNOT_MAX_CHARGE, 1);
      ctx.strokeStyle = 'rgba(200,180,30,0.7)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(SNOT_BTN.x, SNOT_BTN.y, SNOT_BTN.r, -Math.PI / 2, -Math.PI / 2 + chargeRatio * Math.PI * 2);
      ctx.stroke();
    }
    // Cooldown arc
    if (!snotReady && !snotHolding) {
      const cdRatio = 1 - player.snotCooldown / SNOT_COOLDOWN;
      ctx.strokeStyle = 'rgba(100,200,40,0.4)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(SNOT_BTN.x, SNOT_BTN.y, SNOT_BTN.r, -Math.PI / 2, -Math.PI / 2 + cdRatio * Math.PI * 2);
      ctx.stroke();
    }
    ctx.fillStyle = snotReady ? '#88cc22' : (snotHolding ? '#ddcc22' : 'rgba(255,255,255,0.25)');
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(snotHolding ? 'AIM' : 'SNOT', SNOT_BTN.x, SNOT_BTN.y + 4);

    // --- JUMP button ---
    const jumpActive = jumpTouch !== null;
    ctx.beginPath();
    ctx.arc(JUMP_BTN.x, JUMP_BTN.y, JUMP_BTN.r, 0, Math.PI * 2);
    ctx.fillStyle = jumpActive ? 'rgba(68,255,68,0.25)' : 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = jumpActive ? 'rgba(68,255,68,0.5)' : 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = jumpActive ? '#88ff88' : 'rgba(255,255,255,0.45)';
    ctx.font = 'bold 13px monospace';
    ctx.fillText('JUMP', JUMP_BTN.x, JUMP_BTN.y + 5);

    // --- Joystick visual ---
    const STICK_BASE_X = 80;
    const STICK_BASE_Y = H - 90;
    const STICK_R = 50;
    const KNOB_R = 22;

    if (joyOrigin) {
      // Active: show joystick at touch origin
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const ox = (joyOrigin.x - rect.left) * scaleX;
      const oy = (joyOrigin.y - rect.top) * scaleY;

      // Base ring
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ox, oy, STICK_R, 0, Math.PI * 2);
      ctx.stroke();

      // Knob follows thumb, clamped to radius
      if (joyPos) {
        let tx = (joyPos.x - rect.left) * scaleX;
        let ty = (joyPos.y - rect.top) * scaleY;
        const dx = tx - ox, dy = ty - oy;
        const dist = Math.hypot(dx, dy);
        if (dist > STICK_R) {
          tx = ox + dx / dist * STICK_R;
          ty = oy + dy / dist * STICK_R;
        }
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(tx, ty, KNOB_R, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // Idle: show static joystick as affordance
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(STICK_BASE_X, STICK_BASE_Y, STICK_R, 0, Math.PI * 2);
      ctx.stroke();

      // Center knob
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.beginPath();
      ctx.arc(STICK_BASE_X, STICK_BASE_Y, KNOB_R, 0, Math.PI * 2);
      ctx.fill();

      // Arrows
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('\u25C0', STICK_BASE_X - 36, STICK_BASE_Y + 5);
      ctx.fillText('\u25B6', STICK_BASE_X + 36, STICK_BASE_Y + 5);

      // Label
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '10px monospace';
      ctx.fillText('MOVE', STICK_BASE_X, STICK_BASE_Y + STICK_R + 14);
    }
  };
}
