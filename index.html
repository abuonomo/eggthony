// ============================================================
// BOSS SYSTEM — EVIL EGGTHONY
// ============================================================
let boss = null;
let bossActive = false;
let bossEntering = false;
let bossDefeated = false;
let bossHPBarFlash = 0;

function isBossRound(r) {
  return r >= 3 && r % 3 === 0;
}

function bossAppearance(r) {
  return Math.floor(r / 3);
}

function createBoss(r) {
  const app = bossAppearance(r);
  const scale = 1 + (app - 1) * 0.2;
  const baseH = 180;
  const baseW = Math.round(baseH * (818 / 1164)); // match evil_eggthony aspect ratio
  const w = Math.round(baseW * scale);
  const h = Math.round(baseH * scale);
  return {
    x: W / 2 - w / 2,
    y: -h - 50,
    w, h,
    vx: 0,
    vy: 0,
    hp: 300 + (app - 1) * 200,
    maxHp: 300 + (app - 1) * 200,
    damage: 20 + (app - 1) * 10,
    scoreValue: 1000 + (app - 1) * 500,
    speed: 100 + (app - 1) * 15,
    onPlatform: false,
    facingRight: true,
    flashTimer: 0,
    dying: false,
    deathTimer: 0,
    state: 'entering',
    attackCooldown: 2.0,
    chargeSpeed: 350 + (app - 1) * 30,
    chargeTimer: 0,
    chargeDir: 1,
    poundTargetX: 0,
    poundTimer: 0,
    shockwaveTimer: 0,
    shockwaveActive: false,
    shockwaveX: 0,
    shockwaveRadius: 0,
    rage: false,
    animTimer: 0,
    appearance: app,
    freezeTimer: 0
  };
}

function updateBoss(dt) {
  if (!boss || !bossActive) return;

  boss.animTimer += dt * 3;
  boss.flashTimer = Math.max(0, boss.flashTimer - dt);
  bossHPBarFlash = Math.max(0, bossHPBarFlash - dt);

  // Death animation
  if (boss.dying) {
    boss.deathTimer -= dt;
    if (boss.deathTimer <= 0) {
      score += boss.scoreValue;
      spawnDamageNumber(boss.x + boss.w / 2, boss.y, boss.scoreValue, '#ffdd00');
      bossDefeated = true;
      bossActive = false;
      boss = null;
    }
    return;
  }

  // Rage mode check
  if (!boss.rage && boss.hp <= boss.maxHp * 0.3) {
    boss.rage = true;
    addShake(8, 0.3);
    playSound('bossRoar');
    spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff2222', 20, 200, 0.6);
  }

  // Freeze
  if (boss.freezeTimer > 0) {
    boss.freezeTimer -= dt;
    // Update shockwave even while frozen
    if (boss.shockwaveActive) {
      boss.shockwaveRadius += 400 * dt;
      boss.shockwaveTimer -= dt;
      if (boss.shockwaveTimer <= 0) boss.shockwaveActive = false;
    }
    return;
  }

  const rageMult = boss.rage ? 1.3 : 1.0;
  const cooldownMult = boss.rage ? 0.5 : 1.0;

  const pcx = player.x + PLAYER_W / 2;
  const pcy = player.y + PLAYER_H / 2;
  const bcx = boss.x + boss.w / 2;
  const bcy = boss.y + boss.h / 2;

  switch (boss.state) {
    case 'entering': {
      boss.vy += GRAVITY * 1.5 * dt;
      boss.y += boss.vy * dt;

      if (boss.y + boss.h >= PLATFORM_Y) {
        boss.y = PLATFORM_Y - boss.h;
        boss.vy = 0;
        boss.onPlatform = true;
        boss.state = 'idle';
        boss.attackCooldown = 1.5;
        bossEntering = false;
        addShake(15, 0.4);
        spawnParticles(boss.x + boss.w / 2, PLATFORM_Y, '#ffaa44', 30, 250, 0.6);
        spawnParticles(boss.x + boss.w / 2, PLATFORM_Y, '#ff6622', 20, 200, 0.5);
        playSound('bossSlam');
        playNoise(0.2, 0.25);
      }
      break;
    }

    case 'idle': {
      const dx = pcx - bcx;
      boss.facingRight = dx > 0;
      boss.vx = Math.sign(dx) * boss.speed * rageMult * 0.6;
      boss.x += boss.vx * dt;

      if (boss.x < PLATFORM_X) boss.x = PLATFORM_X;
      if (boss.x + boss.w > PLATFORM_X + PLATFORM_W) boss.x = PLATFORM_X + PLATFORM_W - boss.w;

      boss.attackCooldown -= dt;
      if (boss.attackCooldown <= 0) {
        const dist = Math.abs(pcx - bcx);
        if (dist < 250 && Math.random() < 0.5) {
          boss.state = 'charge_windup';
          boss.chargeTimer = 0.5;
          boss.chargeDir = Math.sign(pcx - bcx) || 1;
          boss.vx = 0;
        } else {
          boss.state = 'pound_jump';
          boss.vy = -600;
          boss.onPlatform = false;
          boss.poundTargetX = pcx;
        }
      }
      break;
    }

    case 'charge_windup': {
      boss.chargeTimer -= dt;
      boss.vx = 0;
      if (boss.chargeTimer <= 0) {
        boss.state = 'charge';
        boss.chargeTimer = 1.2;
        playSound('bossRoar');
      }
      break;
    }

    case 'charge': {
      boss.vx = boss.chargeDir * boss.chargeSpeed * rageMult;
      boss.x += boss.vx * dt;
      boss.chargeTimer -= dt;

      if (boss.x < PLATFORM_X) {
        boss.x = PLATFORM_X;
        boss.chargeTimer = 0;
      }
      if (boss.x + boss.w > PLATFORM_X + PLATFORM_W) {
        boss.x = PLATFORM_X + PLATFORM_W - boss.w;
        boss.chargeTimer = 0;
      }

      if (boss.chargeTimer <= 0) {
        boss.state = 'idle';
        boss.attackCooldown = 2.0 * cooldownMult;
        boss.vx = 0;
      }
      break;
    }

    case 'pound_jump': {
      boss.vy += GRAVITY * dt;
      boss.y += boss.vy * dt;

      const targetDx = boss.poundTargetX - (boss.x + boss.w / 2);
      boss.x += targetDx * 3 * dt;

      if (boss.vy >= 0) {
        boss.state = 'pound_fall';
        boss.x = boss.poundTargetX - boss.w / 2;
        if (boss.x < PLATFORM_X) boss.x = PLATFORM_X;
        if (boss.x + boss.w > PLATFORM_X + PLATFORM_W) boss.x = PLATFORM_X + PLATFORM_W - boss.w;
      }
      break;
    }

    case 'pound_fall': {
      boss.vy += GRAVITY * 2.0 * dt;
      boss.y += boss.vy * dt;

      if (boss.y + boss.h >= PLATFORM_Y) {
        boss.y = PLATFORM_Y - boss.h;
        boss.vy = 0;
        boss.onPlatform = true;
        boss.state = 'pound_land';
        boss.poundTimer = 0.3;

        boss.shockwaveActive = true;
        boss.shockwaveX = boss.x + boss.w / 2;
        boss.shockwaveRadius = 0;
        boss.shockwaveTimer = 0.4;

        addShake(12, 0.3);
        spawnParticles(boss.x + boss.w / 2, PLATFORM_Y, '#ffaa44', 25, 300, 0.5);
        playSound('bossSlam');
        playNoise(0.25, 0.2);

        const shockDist = Math.abs(pcx - (boss.x + boss.w / 2));
        if (shockDist < 120 && player.iframes <= 0) {
          if (player.metalTimer > 0) {
            const knockDir = Math.sign(pcx - (boss.x + boss.w / 2));
            player.vx = knockDir * 400;
            player.vy = -300;
            spawnParticles(pcx, pcy, '#aaccff', 6, 120, 0.3);
            playSound('hit');
          } else {
            const knockDir = Math.sign(pcx - (boss.x + boss.w / 2)) || 1;
            player.hp -= boss.damage;
            player.iframes = IFRAME_DURATION;
            player.vx = knockDir * 400;
            player.vy = -250;
            player.flashTimer = 0.15;
            spawnDamageNumber(pcx, player.y, boss.damage, '#ff4444');
            addShake(6, 0.15);
            playSound('hurt');
            if (Math.random() < 0.3) playVoice('bad');
          }
        }
      }
      break;
    }

    case 'pound_land': {
      boss.poundTimer -= dt;
      boss.vx = 0;
      if (boss.poundTimer <= 0) {
        boss.state = 'idle';
        boss.attackCooldown = 2.0 * cooldownMult;
      }
      break;
    }
  }

  // Update shockwave
  if (boss.shockwaveActive) {
    boss.shockwaveRadius += 400 * dt;
    boss.shockwaveTimer -= dt;
    if (boss.shockwaveTimer <= 0) {
      boss.shockwaveActive = false;
    }
  }

  // Contact damage to player
  if (boss.state !== 'entering' && !boss.dying && player.iframes <= 0) {
    if (rectsOverlap(player.x, player.y, PLAYER_W, PLAYER_H, boss.x, boss.y, boss.w, boss.h)) {
      if (player.metalTimer > 0) {
        const knockDir = Math.sign(boss.x + boss.w / 2 - pcx);
        damageBoss(40, knockDir * 100, -50);
        spawnParticles(pcx, pcy, '#aaccff', 6, 120, 0.3);
        playSound('hit');
        player.iframes = 0.2;
      } else {
        const knockDir = Math.sign(pcx - (boss.x + boss.w / 2));
        player.hp -= boss.damage;
        player.iframes = IFRAME_DURATION;
        player.vx = knockDir * CONTACT_KNOCKBACK;
        player.vy = -200;
        player.flashTimer = 0.15;
        spawnDamageNumber(pcx, player.y, boss.damage, '#ff4444');
        addShake(6, 0.15);
        playSound('hurt');
        if (Math.random() < 0.3) playVoice('bad');
      }
    }
  }

  // Muscle mode AoE slam on boss
  if (player.muscleTimer > 0 && player.slamCooldown <= 0 && !boss.dying && boss.state !== 'entering') {
    const slamDist = Math.hypot(bcx - pcx, bcy - pcy);
    if (slamDist < 80) {
      const knockDir = Math.sign(bcx - pcx) || 1;
      damageBoss(30, knockDir * 100, -80);
      for (let s = 0; s < 8; s++) {
        const angle = (s / 8) * Math.PI * 2;
        particles.push({
          x: pcx + Math.cos(angle) * 20,
          y: pcy + Math.sin(angle) * 20,
          vx: Math.cos(angle) * 200,
          vy: Math.sin(angle) * 200 - 50,
          life: 0.3, maxLife: 0.3,
          color: '#cc66ff', size: 4
        });
      }
      spawnParticles(bcx, bcy, '#dd88ff', 6, 120, 0.3);
      addShake(5, 0.12);
      playSound('slam');
      player.slamCooldown = 0.4;
    }
  }
}

function damageBoss(damage, knockX, knockY) {
  if (!boss || boss.dying) return;
  boss.hp -= damage;
  boss.flashTimer = 0.1;
  bossHPBarFlash = 0.15;
  // Reduced knockback (boss is heavy)
  boss.x += knockX * 0.3 * (1 / 60);

  spawnDamageNumber(boss.x + boss.w / 2, boss.y, damage, '#ffff44');
  playSound('hit');

  if (boss.hp <= 0) {
    boss.dying = true;
    boss.deathTimer = 1.0;
    boss.vx = 0;
    spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff4422', 40, 350, 0.8);
    spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ffaa44', 30, 300, 0.7);
    spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ffdd00', 20, 250, 0.6);
    addShake(18, 0.6);
    playSound('bossDeath');
    playNoise(0.5, 0.3);
    playVoice('win', true);
  }
}

function drawBoss() {
  if (!boss || !bossActive) return;

  const bcx = boss.x + boss.w / 2;
  const bcy = boss.y + boss.h / 2;

  if (boss.dying) {
    ctx.globalAlpha = Math.max(0, boss.deathTimer / 1.0);
    if (Math.floor(boss.deathTimer * 20) % 2 === 0) {
      ctx.globalAlpha *= 0.5;
    }
  }

  ctx.save();

  // Red aura
  const auraSize = boss.rage ? 1.4 : 1.15;
  const auraAlpha = boss.rage ? (0.25 + 0.15 * Math.sin(performance.now() * 0.01)) : 0.1;
  const auraGrad = ctx.createRadialGradient(bcx, bcy, boss.w * 0.3, bcx, bcy, boss.w * auraSize);
  auraGrad.addColorStop(0, `rgba(255,0,0,${auraAlpha})`);
  auraGrad.addColorStop(1, 'rgba(255,0,0,0)');
  ctx.fillStyle = auraGrad;
  ctx.fillRect(bcx - boss.w * auraSize, bcy - boss.h * auraSize, boss.w * auraSize * 2, boss.h * auraSize * 2);

  // Charge telegraph arrows
  if (boss.state === 'charge_windup') {
    const arrowAlpha = 0.5 + 0.5 * Math.sin(performance.now() * 0.015);
    ctx.fillStyle = `rgba(255,60,20,${arrowAlpha})`;
    ctx.font = 'bold 30px monospace';
    ctx.textAlign = 'center';
    if (boss.chargeDir > 0) {
      ctx.fillText('>>>', bcx + boss.w, bcy);
    } else {
      ctx.fillText('<<<', bcx - boss.w, bcy);
    }
  }

  // Draw sprite
  if (evilSpriteLoaded) {
    ctx.save();
    if (!boss.facingRight) {
      ctx.translate(bcx, bcy);
      ctx.scale(-1, 1);
      ctx.translate(-bcx, -bcy);
    }

    ctx.drawImage(evilSprite, boss.x, boss.y, boss.w, boss.h);

    if (boss.flashTimer > 0) {
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = `rgba(255,255,255,${boss.flashTimer * 5})`;
      ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
    }

    if (boss.rage) {
      ctx.globalCompositeOperation = 'source-atop';
      const tint = 0.15 + 0.1 * Math.sin(performance.now() * 0.008);
      ctx.fillStyle = `rgba(255,0,0,${tint})`;
      ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
    }

    ctx.restore();
  } else {
    ctx.fillStyle = boss.flashTimer > 0 ? '#ffffff' : (boss.rage ? '#cc2222' : '#882222');
    ctx.beginPath();
    ctx.ellipse(bcx, bcy + boss.h * 0.1, boss.w / 2, boss.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff0000';
    const eyeOff = boss.facingRight ? boss.w * 0.1 : -boss.w * 0.1;
    const eyeSize = Math.max(3, boss.w * 0.08);
    ctx.fillRect(bcx + eyeOff - eyeSize * 1.5, bcy - boss.h * 0.15, eyeSize, eyeSize);
    ctx.fillRect(bcx + eyeOff + eyeSize * 0.5, bcy - boss.h * 0.15, eyeSize, eyeSize);
  }

  // Freeze visual on boss
  if (boss.freezeTimer > 0) {
    ctx.fillStyle = `rgba(100,200,40,${0.3 + 0.1 * Math.sin(performance.now() * 0.005)})`;
    ctx.beginPath();
    ctx.ellipse(bcx, bcy, boss.w / 2 + 4, boss.h / 2 + 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#88cc22';
    for (let b = 0; b < 5; b++) {
      const bx = bcx + (b - 2) * boss.w * 0.2;
      const by = bcy + boss.h * 0.3 + Math.sin(performance.now() * 0.003 + b * 1.2) * 4;
      ctx.beginPath();
      ctx.arc(bx, by, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Shockwave ring
  if (boss.shockwaveActive) {
    const alpha = Math.max(0, boss.shockwaveTimer / 0.4);
    ctx.strokeStyle = `rgba(255,120,40,${alpha})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(boss.shockwaveX, PLATFORM_Y, boss.shockwaveRadius, Math.PI, 0);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255,200,60,${alpha * 0.5})`;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(boss.shockwaveX, PLATFORM_Y, boss.shockwaveRadius * 0.8, Math.PI, 0);
    ctx.stroke();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawBossHPBar() {
  if (!boss || !bossActive || boss.dying) return;

  const barX = 20;
  const barY = H - 40;
  const barW = W - 40;
  const barH = 18;

  ctx.fillStyle = '#220000';
  ctx.fillRect(barX, barY, barW, barH);

  const hpRatio = Math.max(0, boss.hp / boss.maxHp);
  const barColor = boss.rage ? '#ff2222' : '#cc2222';
  ctx.fillStyle = barColor;
  ctx.fillRect(barX, barY, barW * hpRatio, barH);

  if (bossHPBarFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${bossHPBarFlash * 3})`;
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
  }

  ctx.strokeStyle = boss.rage ? '#ff4444' : '#882222';
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY, barW, barH);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('EVIL EGGTHONY', barX + 6, barY + 13);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffcc44';
  ctx.fillText(`Lvl ${boss.appearance}`, barX + barW - 6, barY + 13);
}

// ============================================================
// AMBIENT PARTICLES (theme-aware: stars / spores / embers)
// ============================================================
let ambientParticles = [];

function initAmbientParticles() {
  ambientParticles = [];
  const theme = getTheme();
  const count = theme.ambientCount;
  for (let i = 0; i < count; i++) {
    ambientParticles.push(createAmbientParticle(theme, true));
  }
}

function createAmbientParticle(theme, randomY) {
  const t = theme.ambientType;
  if (t === 'stars') {
    return {
      x: Math.random() * W,
      y: randomY ? Math.random() * H : 0,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 20 + 5,
      brightness: Math.random() * 0.5 + 0.5,
      type: 'stars'
    };
  } else if (t === 'spores') {
    return {
      x: Math.random() * W,
      y: randomY ? Math.random() * H : H + Math.random() * 40,
      size: Math.random() * 3 + 1.5,
      speed: -(15 + Math.random() * 25), // drift upward
      drift: (Math.random() - 0.5) * 20,
      brightness: Math.random() * 0.6 + 0.3,
      glowPhase: Math.random() * Math.PI * 2,
      type: 'spores'
    };
  } else { // embers
    return {
      x: Math.random() * W,
      y: randomY ? Math.random() * H : H + Math.random() * 20,
      size: Math.random() * 2.5 + 1,
      speed: -(40 + Math.random() * 60), // fast upward
      drift: (Math.random() - 0.5) * 30,
      brightness: Math.random() * 0.8 + 0.2,
      glowPhase: Math.random() * Math.PI * 2,
      hue: Math.random() < 0.6 ? 0 : 1, // 0=orange, 1=red
      type: 'embers'
    };
  }
}

function updateAmbientParticles(dt) {
  const theme = getTheme();
  for (const s of ambientParticles) {
    if (s.type === 'stars') {
      s.y += s.speed * dt;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
      s.brightness = 0.5 + 0.5 * Math.sin(performance.now() * 0.001 * s.speed * 0.1);
    } else if (s.type === 'spores') {
      s.y += s.speed * dt;
      s.x += s.drift * dt;
      s.glowPhase += dt * 2;
      s.brightness = 0.3 + 0.3 * Math.sin(s.glowPhase);
      if (s.y < -10) { s.y = H + 10; s.x = Math.random() * W; }
      if (s.x < -10) s.x = W + 10;
      if (s.x > W + 10) s.x = -10;
    } else { // embers
      s.y += s.speed * dt;
      s.x += s.drift * dt;
      s.glowPhase += dt * 4;
      s.brightness = 0.4 + 0.4 * Math.sin(s.glowPhase);
      if (s.y < -10) { s.y = H + 10; s.x = Math.random() * W; }
      if (s.x < -10) s.x = W + 10;
      if (s.x > W + 10) s.x = -10;
    }
  }
}

function drawAmbientParticles() {
  for (const s of ambientParticles) {
    if (s.type === 'stars') {
      ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
      ctx.fillRect(s.x, s.y, s.size, s.size);
    } else if (s.type === 'spores') {
      ctx.fillStyle = `rgba(80,255,80,${s.brightness})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
      // glow halo
      ctx.fillStyle = `rgba(60,200,60,${s.brightness * 0.3})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 2.5, 0, Math.PI * 2);
      ctx.fill();
    } else { // embers
      const r = s.hue === 0 ? 255 : 220;
      const g = s.hue === 0 ? 140 : 50;
      const b = s.hue === 0 ? 20 : 10;
      ctx.fillStyle = `rgba(${r},${g},${b},${s.brightness})`;
      ctx.fillRect(s.x - s.size / 2, s.y - s.size / 2, s.size, s.size);
      // glow
      ctx.fillStyle = `rgba(${r},${g},${b},${s.brightness * 0.2})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// Init ambient particles for default theme
initAmbientParticles();

// ============================================================
// BACKGROUND DETAILS (pre-computed, regenerated on theme change)
// ============================================================
let bgDetails = {};

function initBgDetails() {
  bgDetails = {};
  const theme = getTheme();

  if (theme.ambientType === 'stars') {
    // Hull panel lines for space station
    bgDetails.hullPanels = [];
    for (let i = 0; i < 8; i++) {
      bgDetails.hullPanels.push({
        x: Math.random() * W,
        y: Math.random() * PLATFORM_Y * 0.8,
        w: 40 + Math.random() * 80,
        h: 30 + Math.random() * 60
      });
    }
  } else if (theme.ambientType === 'spores') {
    // Hanging vines at top
    bgDetails.vines = [];
    for (let i = 0; i < 12; i++) {
      const x = 20 + Math.random() * (W - 40);
      const segments = 4 + Math.floor(Math.random() * 5);
      const vine = { x, segments: [], berries: [] };
      let cy = 0;
      for (let j = 0; j < segments; j++) {
        cy += 12 + Math.random() * 18;
        vine.segments.push({ x: x + (Math.random() - 0.5) * 20, y: cy });
      }
      // Glowing berries at ends
      if (Math.random() < 0.6) {
        const last = vine.segments[vine.segments.length - 1];
        vine.berries.push({ x: last.x, y: last.y + 4, phase: Math.random() * Math.PI * 2 });
      }
      bgDetails.vines.push(vine);
    }
    // Canopy silhouettes
    bgDetails.canopy = [];
    for (let i = 0; i < 6; i++) {
      bgDetails.canopy.push({
        x: Math.random() * W,
        r: 40 + Math.random() * 60,
        y: -10 + Math.random() * 20
      });
    }
  } else { // embers / volcanic
    // Stalactites at top
    bgDetails.stalactites = [];
    for (let i = 0; i < 10; i++) {
      bgDetails.stalactites.push({
        x: 20 + Math.random() * (W - 40),
        w: 6 + Math.random() * 10,
        h: 20 + Math.random() * 50
      });
    }
    // Magma vein cracks in background
    bgDetails.magmaVeins = [];
    for (let i = 0; i < 5; i++) {
      const startX = Math.random() * W;
      const startY = 50 + Math.random() * (PLATFORM_Y - 100);
      const segs = [];
      let cx = startX, cy = startY;
      for (let j = 0; j < 4 + Math.floor(Math.random() * 4); j++) {
        cx += (Math.random() - 0.5) * 60;
        cy += 10 + Math.random() * 30;
        segs.push({ x: cx, y: cy });
      }
      bgDetails.magmaVeins.push({ startX, startY, segs });
    }
  }
}

initBgDetails();

function drawBackground() {
  const theme = getTheme();

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, theme.bgTop);
  grad.addColorStop(1, theme.bgBottom);
  ctx.fillStyle = grad;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Theme-specific background decorations
  if (theme.ambientType === 'stars') {
    // Subtle blue nebula glow
    const ncx = W * 0.3, ncy = H * 0.25;
    const nebGrad = ctx.createRadialGradient(ncx, ncy, 20, ncx, ncy, 180);
    nebGrad.addColorStop(0, theme.nebulaColor);
    nebGrad.addColorStop(1, 'rgba(30,60,120,0)');
    ctx.fillStyle = nebGrad;
    ctx.fillRect(0, 0, W, H);

    // Hull panel outlines
    ctx.strokeStyle = 'rgba(60,80,110,0.06)';
    ctx.lineWidth = 1;
    for (const p of bgDetails.hullPanels || []) {
      ctx.strokeRect(p.x, p.y, p.w, p.h);
    }
  } else if (theme.ambientType === 'spores') {
    // Alien canopy silhouettes at top
    ctx.fillStyle = 'rgba(10,40,20,0.5)';
    for (const c of bgDetails.canopy || []) {
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.r, c.r * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Hanging vines
    ctx.strokeStyle = 'rgba(30,100,40,0.4)';
    ctx.lineWidth = 2;
    for (const vine of bgDetails.vines || []) {
      ctx.beginPath();
      ctx.moveTo(vine.x, 0);
      for (const seg of vine.segments) {
        ctx.lineTo(seg.x, seg.y);
      }
      ctx.stroke();
      // Glowing berries
      for (const b of vine.berries) {
        const glow = 0.4 + 0.3 * Math.sin(performance.now() * 0.003 + b.phase);
        ctx.fillStyle = `rgba(80,255,120,${glow})`;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = `rgba(80,255,120,${glow * 0.3})`;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 7, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Fog layer just above platform
    const fogGrad = ctx.createLinearGradient(0, PLATFORM_Y - 60, 0, PLATFORM_Y);
    fogGrad.addColorStop(0, 'rgba(20,60,30,0)');
    fogGrad.addColorStop(1, 'rgba(20,60,30,0.15)');
    ctx.fillStyle = fogGrad;
    ctx.fillRect(0, PLATFORM_Y - 60, W, 60);
  } else { // volcanic
    // Lava glow from below
    const lavaGrad = ctx.createLinearGradient(0, PLATFORM_Y, 0, H);
    lavaGrad.addColorStop(0, 'rgba(200,80,10,0.08)');
    lavaGrad.addColorStop(0.5, 'rgba(200,60,5,0.15)');
    lavaGrad.addColorStop(1, 'rgba(180,40,0,0.25)');
    ctx.fillStyle = lavaGrad;
    ctx.fillRect(0, PLATFORM_Y, W, H - PLATFORM_Y);

    // Stalactites at top
    ctx.fillStyle = '#1a0e0c';
    for (const st of bgDetails.stalactites || []) {
      ctx.beginPath();
      ctx.moveTo(st.x - st.w / 2, 0);
      ctx.lineTo(st.x + st.w / 2, 0);
      ctx.lineTo(st.x, st.h);
      ctx.closePath();
      ctx.fill();
    }

    // Magma vein cracks
    const veinGlow = 0.3 + 0.15 * Math.sin(performance.now() * 0.002);
    ctx.strokeStyle = `rgba(255,100,20,${veinGlow})`;
    ctx.lineWidth = 1.5;
    for (const vein of bgDetails.magmaVeins || []) {
      ctx.beginPath();
      ctx.moveTo(vein.startX, vein.startY);
      for (const seg of vein.segs) {
        ctx.lineTo(seg.x, seg.y);
      }
      ctx.stroke();
    }
    // glow pass
    ctx.strokeStyle = `rgba(255,60,10,${veinGlow * 0.4})`;
    ctx.lineWidth = 4;
    for (const vein of bgDetails.magmaVeins || []) {
      ctx.beginPath();
      ctx.moveTo(vein.startX, vein.startY);
      for (const seg of vein.segs) {
        ctx.lineTo(seg.x, seg.y);
      }
      ctx.stroke();
    }
  }

  // Draw ambient particles on top of background
  drawAmbientParticles();
}

// ============================================================
// PLATFORM
// ============================================================
function drawPlatform() {
  const theme = getTheme();
  const pw = theme.pillarWidth;
  const [ugR, ugG, ugB] = theme.underglowColor;

  // Main platform body
  ctx.fillStyle = theme.platformColor;
  ctx.fillRect(PLATFORM_X, PLATFORM_Y, PLATFORM_W, PLATFORM_H);
  // Top edge highlight
  ctx.fillStyle = theme.platformHighlight;
  ctx.fillRect(PLATFORM_X, PLATFORM_Y, PLATFORM_W, 4);
  // Bottom edge
  ctx.fillStyle = theme.platformDark;
  ctx.fillRect(PLATFORM_X, PLATFORM_Y + PLATFORM_H - 4, PLATFORM_W, 4);

  // Side pillars
  const pillarH = H - PLATFORM_Y;
  ctx.fillStyle = theme.pillarColor;
  ctx.fillRect(PLATFORM_X, PLATFORM_Y, pw, pillarH);
  ctx.fillRect(PLATFORM_X + PLATFORM_W - pw, PLATFORM_Y, pw, pillarH);

  // Theme-specific pillar/platform decorations
  if (theme.decorStyle === 'rivets') {
    // Brushed steel panel lines on platform
    ctx.fillStyle = 'rgba(120,150,180,0.15)';
    const numLines = Math.floor(PLATFORM_W / 60);
    const lineSpacing = PLATFORM_W / numLines;
    for (let i = 0; i < numLines; i++) {
      ctx.fillRect(PLATFORM_X + 10 + i * lineSpacing, PLATFORM_Y + 8, lineSpacing * 0.6, 3);
    }
    // Rivet dots
    ctx.fillStyle = 'rgba(140,170,200,0.2)';
    for (let i = 0; i < numLines + 1; i++) {
      const rx = PLATFORM_X + 6 + i * lineSpacing;
      ctx.beginPath();
      ctx.arc(rx, PLATFORM_Y + 6, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(rx, PLATFORM_Y + PLATFORM_H - 6, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Panel seams on pillars every 40px
    ctx.strokeStyle = 'rgba(100,130,160,0.12)';
    ctx.lineWidth = 1;
    for (let y = PLATFORM_Y; y < H; y += 40) {
      ctx.beginPath();
      ctx.moveTo(PLATFORM_X, y); ctx.lineTo(PLATFORM_X + pw, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(PLATFORM_X + PLATFORM_W - pw, y); ctx.lineTo(PLATFORM_X + PLATFORM_W, y);
      ctx.stroke();
    }
  } else if (theme.decorStyle === 'roots') {
    // Root texture lines on platform
    ctx.strokeStyle = 'rgba(60,100,50,0.25)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
      const rx = PLATFORM_X + 20 + i * (PLATFORM_W / 6);
      ctx.beginPath();
      ctx.moveTo(rx, PLATFORM_Y + 4);
      ctx.quadraticCurveTo(rx + 15, PLATFORM_Y + 12, rx + 5, PLATFORM_Y + PLATFORM_H - 2);
      ctx.stroke();
    }
    // Bark texture on pillars (horizontal lines)
    ctx.strokeStyle = 'rgba(80,60,40,0.2)';
    ctx.lineWidth = 1;
    for (let y = PLATFORM_Y; y < H; y += 8) {
      const wobble = Math.sin(y * 0.1) * 2;
      ctx.beginPath();
      ctx.moveTo(PLATFORM_X + wobble, y);
      ctx.lineTo(PLATFORM_X + pw + wobble, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(PLATFORM_X + PLATFORM_W - pw + wobble, y);
      ctx.lineTo(PLATFORM_X + PLATFORM_W + wobble, y);
      ctx.stroke();
    }
    // Root flare at top of pillars
    ctx.fillStyle = theme.pillarColor;
    ctx.beginPath();
    ctx.moveTo(PLATFORM_X, PLATFORM_Y);
    ctx.quadraticCurveTo(PLATFORM_X - 6, PLATFORM_Y + 20, PLATFORM_X, PLATFORM_Y + 30);
    ctx.lineTo(PLATFORM_X + pw + 4, PLATFORM_Y + 30);
    ctx.quadraticCurveTo(PLATFORM_X + pw + 6, PLATFORM_Y + 15, PLATFORM_X + pw, PLATFORM_Y);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(PLATFORM_X + PLATFORM_W, PLATFORM_Y);
    ctx.quadraticCurveTo(PLATFORM_X + PLATFORM_W + 6, PLATFORM_Y + 20, PLATFORM_X + PLATFORM_W, PLATFORM_Y + 30);
    ctx.lineTo(PLATFORM_X + PLATFORM_W - pw - 4, PLATFORM_Y + 30);
    ctx.quadraticCurveTo(PLATFORM_X + PLATFORM_W - pw - 6, PLATFORM_Y + 15, PLATFORM_X + PLATFORM_W - pw, PLATFORM_Y);
    ctx.closePath();
    ctx.fill();
  } else if (theme.decorStyle === 'cracks') {
    // Crack lines with magma glow on platform
    const crackGlow = 0.3 + 0.2 * Math.sin(performance.now() * 0.003);
    ctx.strokeStyle = `rgba(255,100,20,${crackGlow})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const cx = PLATFORM_X + 30 + i * (PLATFORM_W / 5);
      ctx.beginPath();
      ctx.moveTo(cx, PLATFORM_Y + 2);
      ctx.lineTo(cx + 8, PLATFORM_Y + PLATFORM_H / 2);
      ctx.lineTo(cx - 3, PLATFORM_Y + PLATFORM_H - 2);
      ctx.stroke();
    }
    // Pulsing lava veins on pillars
    ctx.strokeStyle = `rgba(255,80,10,${crackGlow * 0.6})`;
    ctx.lineWidth = 1.5;
    for (let y = PLATFORM_Y + 20; y < H; y += 35) {
      const wobble = Math.sin(y * 0.08 + performance.now() * 0.001) * 3;
      ctx.beginPath();
      ctx.moveTo(PLATFORM_X + pw / 2 + wobble, y);
      ctx.lineTo(PLATFORM_X + pw / 2 - wobble, y + 20);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(PLATFORM_X + PLATFORM_W - pw / 2 + wobble, y);
      ctx.lineTo(PLATFORM_X + PLATFORM_W - pw / 2 - wobble, y + 20);
      ctx.stroke();
    }
  }

  // Underglow (theme-colored)
  const glowH = Math.min(60, H - PLATFORM_Y - PLATFORM_H);
  if (glowH > 0) {
    const glow = ctx.createLinearGradient(PLATFORM_X, PLATFORM_Y + PLATFORM_H, PLATFORM_X, PLATFORM_Y + PLATFORM_H + glowH);
    glow.addColorStop(0, `rgba(${ugR},${ugG},${ugB},0.3)`);
    glow.addColorStop(1, `rgba(${ugR},${ugG},${ugB},0)`);
    ctx.fillStyle = glow;
    ctx.fillRect(PLATFORM_X, PLATFORM_Y + PLATFORM_H, PLATFORM_W, glowH);
  }
}

function drawFloatingPlatforms() {
  const theme = getTheme();
  const [ugR, ugG, ugB] = theme.underglowColor;

  for (const fp of floatingPlatforms) {
    if (fp.phase === 'gone') continue;
    const alpha = fp.alpha * 0.85;
    if (alpha <= 0) continue;

    ctx.save();

    const sx = fp.shakeOffset || 0;
    const dx = fp.x + sx;
    const dy = fp.y;
    const r = 4; // corner radius

    // Underglow beneath platform
    const fpGlow = ctx.createLinearGradient(dx, dy + fp.h, dx, dy + fp.h + 20);
    fpGlow.addColorStop(0, `rgba(${ugR},${ugG},${ugB},${alpha * 0.25})`);
    fpGlow.addColorStop(1, `rgba(${ugR},${ugG},${ugB},0)`);
    ctx.fillStyle = fpGlow;
    ctx.fillRect(dx, dy + fp.h, fp.w, 20);

    // Platform body (rounded rect)
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.moveTo(dx + r, dy);
    ctx.lineTo(dx + fp.w - r, dy);
    ctx.arcTo(dx + fp.w, dy, dx + fp.w, dy + r, r);
    ctx.lineTo(dx + fp.w, dy + fp.h - r);
    ctx.arcTo(dx + fp.w, dy + fp.h, dx + fp.w - r, dy + fp.h, r);
    ctx.lineTo(dx + r, dy + fp.h);
    ctx.arcTo(dx, dy + fp.h, dx, dy + fp.h - r, r);
    ctx.lineTo(dx, dy + r);
    ctx.arcTo(dx, dy, dx + r, dy, r);
    ctx.closePath();
    ctx.fillStyle = theme.platformColor;
    ctx.fill();

    // Top highlight
    ctx.fillStyle = theme.platformHighlight;
    ctx.beginPath();
    ctx.moveTo(dx + r, dy);
    ctx.lineTo(dx + fp.w - r, dy);
    ctx.arcTo(dx + fp.w, dy, dx + fp.w, dy + r, r);
    ctx.lineTo(dx + fp.w, dy + 3);
    ctx.lineTo(dx, dy + 3);
    ctx.lineTo(dx, dy + r);
    ctx.arcTo(dx, dy, dx + r, dy, r);
    ctx.closePath();
    ctx.fill();

    // Bottom dark edge
    ctx.fillStyle = theme.platformDark;
    ctx.fillRect(dx + r, dy + fp.h - 3, fp.w - r * 2, 3);

    // Theme-specific mini decorations
    if (theme.decorStyle === 'rivets') {
      ctx.fillStyle = theme.platformHighlight;
      for (let i = 0; i < 3; i++) {
        const rx = dx + 12 + i * 38;
        ctx.beginPath();
        ctx.arc(rx, dy + fp.h / 2, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (theme.decorStyle === 'roots') {
      ctx.strokeStyle = theme.platformHighlight;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(dx + 10, dy + fp.h);
      ctx.quadraticCurveTo(dx + 5, dy + fp.h + 6, dx + 8, dy + fp.h + 10);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(dx + fp.w - 10, dy + fp.h);
      ctx.quadraticCurveTo(dx + fp.w - 5, dy + fp.h + 6, dx + fp.w - 8, dy + fp.h + 10);
      ctx.stroke();
    } else if (theme.decorStyle === 'cracks') {
      ctx.strokeStyle = theme.platformHighlight;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(dx + fp.w * 0.3, dy + 2);
      ctx.lineTo(dx + fp.w * 0.35, dy + fp.h - 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(dx + fp.w * 0.7, dy + 2);
      ctx.lineTo(dx + fp.w * 0.65, dy + fp.h - 2);
      ctx.stroke();
    }

    // Warning phase: red tint overlay
    if (fp.phase === 'warning') {
      const warnProgress = (fp.lifetime - FLOAT_PLAT_LIFETIME) / FLOAT_PLAT_WARN_TIME;
      const blinkRate = 4 + warnProgress * 12; // accelerating blink
      const blinkOn = Math.sin(fp.lifetime * blinkRate * Math.PI) > 0;
      if (blinkOn) {
        ctx.globalAlpha = alpha * (0.2 + warnProgress * 0.3);
        ctx.fillStyle = '#ff2222';
        ctx.beginPath();
        ctx.moveTo(dx + r, dy);
        ctx.lineTo(dx + fp.w - r, dy);
        ctx.arcTo(dx + fp.w, dy, dx + fp.w, dy + r, r);
        ctx.lineTo(dx + fp.w, dy + fp.h - r);
        ctx.arcTo(dx + fp.w, dy + fp.h, dx + fp.w - r, dy + fp.h, r);
        ctx.lineTo(dx + r, dy + fp.h);
        ctx.arcTo(dx, dy + fp.h, dx, dy + fp.h - r, r);
        ctx.lineTo(dx, dy + r);
        ctx.arcTo(dx, dy, dx + r, dy, r);
        ctx.closePath();
        ctx.fill();
      }
    }

    ctx.restore();
  }
}

// ============================================================
// PARTICLES
// ============================================================
let particles = [];

function spawnParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - Math.random() * 100,
      life: life * (0.5 + Math.random() * 0.5),
      maxLife: life,
      color,
      size: Math.random() * 4 + 2
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 300 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// DAMAGE NUMBERS
// ============================================================
let damageNumbers = [];

function spawnDamageNumber(x, y, amount, color) {
  damageNumbers.push({
    x, y,
    text: String(Math.round(amount)),
    color: color || '#ff4444',
    life: 1.0,
    vy: -80
  });
}

function updateDamageNumbers(dt) {
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.y += d.vy * dt;
    d.vy *= 0.95;
    d.life -= dt;
    if (d.life <= 0) damageNumbers.splice(i, 1);
  }
}

function drawDamageNumbers() {
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  for (const d of damageNumbers) {
    const alpha = Math.max(0, d.life);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#000';
    ctx.fillText(d.text, d.x + 1, d.y + 1);
    ctx.fillStyle = d.color;
    ctx.fillText(d.text, d.x, d.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// PLAYER
// ============================================================
const player = {
  x: W / 2 - PLAYER_W / 2,
  y: PLATFORM_Y - PLAYER_H,
  vx: 0,
  vy: 0,
  onGround: false,
  facingRight: true,
  hp: PLAYER_MAX_HP,
  iframes: 0,
  lightningCooldown: 0,
  flashTimer: 0,
  metalTimer: 0,
  muscleTimer: 0,
  slamCooldown: 0,
  snotCooldown: 0,
  snotHolding: false,
  snotChargeTime: 0,
  airJumps: 1,
  jumpHeld: false
};

function resetPlayer() {
  player.x = W / 2 - PLAYER_W / 2;
  player.y = PLATFORM_Y - PLAYER_H;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.hp = PLAYER_MAX_HP;
  player.iframes = 0;
  player.lightningCooldown = 0;
  player.flashTimer = 0;
  player.metalTimer = 0;
  player.muscleTimer = 0;
  player.slamCooldown = 0;
  player.snotCooldown = 0;
  player.snotHolding = false;
  player.snotChargeTime = 0;
  player.airJumps = 1;
  player.jumpHeld = false;
  lowHpTriggered = false;
}

function updatePlayer(dt) {
  // Movement
  let moveX = 0;
  if (keys['a'] || keys['arrowleft']) moveX -= 1;
  if (keys['d'] || keys['arrowright']) moveX += 1;
  player.vx = moveX * PLAYER_SPEED;

  // Jump (SSBM-style double jump)
  const jumpInput = keys['w'] || keys['arrowup'] || keys[' '];
  if (jumpInput && !player.jumpHeld) {
    if (player.onGround) {
      // Grounded jump — full force
      player.vy = JUMP_FORCE;
      player.onGround = false;
    } else if (player.airJumps > 0) {
      // Aerial double jump — slightly weaker, resets vertical momentum
      player.vy = JUMP_FORCE * 0.85;
      player.airJumps--;
    }
  }
  player.jumpHeld = jumpInput;

  // Gravity
  player.vy += GRAVITY * dt;

  // Apply velocity
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // Platform collision
  const playerBottom = player.y + PLAYER_H;
  const playerCenterX = player.x + PLAYER_W / 2;
  const holdingDown = keys['s'] || keys['arrowdown'];
  if (playerBottom >= PLATFORM_Y && player.vy >= 0 &&
      playerCenterX > PLATFORM_X && playerCenterX < PLATFORM_X + PLATFORM_W &&
      player.y + PLAYER_H - player.vy * dt <= PLATFORM_Y + 10) {
    player.y = PLATFORM_Y - PLAYER_H;
    player.vy = 0;
    player.onGround = true;
    player.airJumps = 1;
  } else {
    // Check floating platforms (one-way, player-only)
    let landedOnFloat = false;
    if (player.vy >= 0) {
      for (const fp of floatingPlatforms) {
        if (fp.phase !== 'solid' && fp.phase !== 'warning') continue;
        const fpTop = fp.y;
        const fpLeft = fp.x;
        const fpRight = fp.x + fp.w;
        // Player center must be over platform
        if (playerCenterX <= fpLeft || playerCenterX >= fpRight) continue;
        // Falling through top surface check
        if (playerBottom >= fpTop && player.y + PLAYER_H - player.vy * dt <= fpTop + 6) {
          // Drop-through: holding down while on or near this platform
          if (holdingDown) continue;
          player.y = fpTop - PLAYER_H;
          player.vy = 0;
          player.onGround = true;
          player.airJumps = 1;
          landedOnFloat = true;
          break;
        }
      }
    }
    if (!landedOnFloat && playerBottom < PLATFORM_Y) {
      player.onGround = false;
    }
  }

  // Clamp to platform horizontal bounds
  if (player.x < PLATFORM_X - 10) player.x = PLATFORM_X - 10;
  if (player.x + PLAYER_W > PLATFORM_X + PLATFORM_W + 10) player.x = PLATFORM_X + PLATFORM_W + 10 - PLAYER_W;

  // Fall off screen = death
  if (player.y > H + 100) {
    player.hp = 0;
  }

  // Facing direction based on mouse
  const pcx = player.x + PLAYER_W / 2;
  player.facingRight = mouse.x >= pcx;

  // Cooldowns
  player.lightningCooldown = Math.max(0, player.lightningCooldown - dt);
  player.iframes = Math.max(0, player.iframes - dt);
  player.flashTimer = Math.max(0, player.flashTimer - dt);
  player.metalTimer = Math.max(0, player.metalTimer - dt);
  player.muscleTimer = Math.max(0, player.muscleTimer - dt);
  player.slamCooldown = Math.max(0, player.slamCooldown - dt);
  player.snotCooldown = Math.max(0, player.snotCooldown - dt);

  // Snot rocket hold-to-charge
  if (player.snotHolding) {
    player.snotChargeTime += dt;
    // Auto-fire at max charge
    if (player.snotChargeTime >= SNOT_MAX_CHARGE) {
      const chargeRatio = 1;
      player.snotHolding = false;
      player.snotChargeTime = 0;
      snotSniffleClip.pause();
      snotSniffleClip.currentTime = 0;
      snotLaunchClip.currentTime = 0;
      snotLaunchClip.play().catch(() => {});
      fireSnotRocket(chargeRatio);
      player.snotCooldown = SNOT_COOLDOWN;
    }
  }

  // Lightning attack (left click or right click)
  if ((mouse.left || mouse.right) && player.lightningCooldown <= 0) {
    player.lightningCooldown = LIGHTNING_COOLDOWN;
    fireLightning();
  }
}

function drawPlayer() {
  const px = player.x;
  const py = player.y;

  // Iframes flicker (not during metal or muscle mode)
  if (player.metalTimer <= 0 && player.muscleTimer <= 0 && player.iframes > 0 && Math.floor(player.iframes * 15) % 2 === 0) return;
  const isMetal = player.metalTimer > 0;
  const isMuscle = player.muscleTimer > 0;

  ctx.save();
  const cx = px + PLAYER_W / 2;
  const cy = py + PLAYER_H / 2;

  // Flash white on hit
  if (player.flashTimer > 0) {
    ctx.globalCompositeOperation = 'source-over';
  }

  // Muscle mode aura ring (drawn behind player)
  if (isMuscle) {
    const auraPhase = performance.now() * 0.006;
    const auraRadius = 60 + Math.sin(auraPhase) * 5;
    const auraAlpha = 0.15 + 0.08 * Math.sin(auraPhase * 2);
    ctx.strokeStyle = `rgba(200,100,255,${auraAlpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, auraRadius, 0, Math.PI * 2);
    ctx.stroke();
    // Inner glow ring
    ctx.strokeStyle = `rgba(255,150,255,${auraAlpha * 0.5})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(cx, cy, auraRadius - 5, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Draw sprite
  const useMetalSprite = isMetal && metalSpriteLoaded;
  const useMuscleSprite = isMuscle && !isMetal && muscleSpriteLoaded;
  const currentSprite = useMetalSprite ? metalSprite : (useMuscleSprite ? muscleSprite : eggSprite);
  if (spriteLoaded) {
    ctx.save();
    if (!player.facingRight) {
      ctx.translate(cx, cy);
      ctx.scale(-1, 1);
      ctx.translate(-cx, -cy);
    }
    // Blink warning when metal is about to expire
    if (isMetal && player.metalTimer < 2 && Math.floor(player.metalTimer * 8) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }
    // Blink warning when muscle is about to expire
    if (isMuscle && !isMetal && player.muscleTimer < 2 && Math.floor(player.muscleTimer * 8) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }
    // Draw sprite at correct aspect ratio (centered on hitbox)
    let drawW = PLAYER_W;
    let drawH = PLAYER_H;
    if (currentSprite.naturalWidth && currentSprite.naturalHeight) {
      const spriteRatio = currentSprite.naturalWidth / currentSprite.naturalHeight;
      drawW = PLAYER_H * spriteRatio;
    }
    const drawX = px + PLAYER_W / 2 - drawW / 2;
    const drawY = py + PLAYER_H - drawH; // align feet
    ctx.drawImage(currentSprite, drawX, drawY, drawW, drawH);
    ctx.globalAlpha = 1;

    // Metal shimmer
    if (isMetal) {
      ctx.globalCompositeOperation = 'source-atop';
      const shimmer = 0.15 + 0.1 * Math.sin(performance.now() * 0.008);
      ctx.fillStyle = `rgba(200,220,255,${shimmer})`;
      ctx.fillRect(drawX, drawY, drawW, drawH);
    }

    // Muscle shimmer (pink/purple)
    if (isMuscle && !isMetal) {
      ctx.globalCompositeOperation = 'source-atop';
      const shimmer = 0.15 + 0.1 * Math.sin(performance.now() * 0.01);
      ctx.fillStyle = `rgba(220,130,255,${shimmer})`;
      ctx.fillRect(drawX, drawY, drawW, drawH);
    }

    // White flash overlay
    if (player.flashTimer > 0) {
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = `rgba(255,255,255,${player.flashTimer * 3})`;
      ctx.fillRect(drawX, drawY, drawW, drawH);
    }
    ctx.restore();
  } else {
    // Fallback egg shape
    ctx.fillStyle = player.flashTimer > 0 ? '#fff' : '#f5e6c8';
    ctx.beginPath();
    ctx.ellipse(cx, cy, PLAYER_W / 2, PLAYER_H / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333';
    const eyeOff = player.facingRight ? 5 : -5;
    ctx.fillRect(cx + eyeOff - 3, cy - 10, 3, 4);
    ctx.fillRect(cx + eyeOff + 5, cy - 10, 3, 4);
  }

  ctx.restore();
}

// ============================================================
// LIGHTNING PROJECTILES
// ============================================================
let lightningBolts = [];

function fireLightning() {
  const cx = player.x + PLAYER_W / 2;
  const cy = player.y + PLAYER_H / 2;
  const angle = Math.atan2(mouse.y - cy, mouse.x - cx);
  lightningBolts.push({
    x: cx,
    y: cy,
    vx: Math.cos(angle) * LIGHTNING_SPEED,
    vy: Math.sin(angle) * LIGHTNING_SPEED,
    life: 1.5,
    segments: generateLightningSegments()
  });
  playSound('lightning');
}

function generateLightningSegments() {
  const segs = [];
  for (let i = 0; i < 5; i++) {
    segs.push({ ox: (Math.random() - 0.5) * 10, oy: (Math.random() - 0.5) * 10 });
  }
  return segs;
}

function updateLightning(dt) {
  for (let i = lightningBolts.length - 1; i >= 0; i--) {
    const b = lightningBolts[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    // Regenerate jitter
    for (const s of b.segments) {
      s.ox = (Math.random() - 0.5) * 12;
      s.oy = (Math.random() - 0.5) * 12;
    }

    // Off screen or expired
    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      lightningBolts.splice(i, 1);
      continue;
    }

    // Hit enemies
    let boltConsumed = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (e.dying) continue;
      const ecx = e.x + e.w / 2;
      const ecy = e.y + e.h / 2;
      const dist = Math.hypot(b.x - ecx, b.y - ecy);
      if (dist < e.w / 2 + 10) {
        damageEnemy(j, LIGHTNING_DAMAGE, b.vx * 0.3, -100);
        spawnParticles(b.x, b.y, '#77ccff', 5, 100, 0.3);
        lightningBolts.splice(i, 1);
        boltConsumed = true;
        break;
      }
    }

    // Hit boss
    if (!boltConsumed && boss && bossActive && !boss.dying && boss.state !== 'entering') {
      const bcx = boss.x + boss.w / 2;
      const bcy = boss.y + boss.h / 2;
      const dist = Math.hypot(b.x - bcx, b.y - bcy);
      if (dist < boss.w / 2 + 10) {
        damageBoss(LIGHTNING_DAMAGE, b.vx * 0.3, -100);
        spawnParticles(b.x, b.y, '#77ccff', 5, 100, 0.3);
        lightningBolts.splice(i, 1);
      }
    }
  }
}

function drawLightning() {
  for (const b of lightningBolts) {
    const angle = Math.atan2(b.vy, b.vx);
    const len = 20;
    ctx.save();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#4488ff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.moveTo(b.x - Math.cos(angle) * len, b.y - Math.sin(angle) * len);
    for (const s of b.segments) {
      ctx.lineTo(b.x + s.ox, b.y + s.oy);
    }
    ctx.lineTo(b.x + Math.cos(angle) * 5, b.y + Math.sin(angle) * 5);
    ctx.stroke();

    // Glow core
    ctx.strokeStyle = '#aaddff';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();

    // Glow dot at tip
    ctx.fillStyle = 'rgba(150,200,255,0.8)';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// SNOT ROCKET (Mortar — Hold & Release Arc System)
// ============================================================
const SNOT_COOLDOWN = 8.0;
const SNOT_MAX_CHARGE = 0.55;
const SNOT_MIN_RANGE = 60;
const SNOT_MAX_RANGE = 380;
const SNOT_FREEZE_DURATION = 3.0;
const SNOT_AOE_RADIUS = 120;
const SNOT_ARC_PEAK = 150; // peak height above platform
let snotRocket = null;

function calcSnotLanding(chargeRatio) {
  const cx = player.x + PLAYER_W / 2;
  const dir = player.facingRight ? 1 : -1;
  const range = SNOT_MIN_RANGE + (SNOT_MAX_RANGE - SNOT_MIN_RANGE) * chargeRatio;
  let landX = cx + dir * range;
  // Clamp to platform bounds
  landX = Math.max(PLATFORM_X, Math.min(PLATFORM_X + PLATFORM_W, landX));
  return landX;
}

function calcSnotArc(chargeRatio) {
  const cx = player.x + PLAYER_W / 2;
  const cy = player.y + PLAYER_H * 0.35; // launch from nose
  const landX = calcSnotLanding(chargeRatio);
  const landY = PLATFORM_Y;
  // Solve for vx, vy to create parabolic arc with given peak height
  // Using standard projectile equations with GRAVITY
  const dx = landX - cx;
  const dy = landY - cy;
  // Peak should be SNOT_ARC_PEAK above the higher of launch/landing
  const peakY = Math.min(cy, landY) - SNOT_ARC_PEAK;
  // Time to reach peak from launch: vy = sqrt(2 * g * (cy - peakY))
  const riseDist = cy - peakY;
  const vy0 = -Math.sqrt(Math.max(0, 2 * GRAVITY * riseDist));
  // Time to peak: t_peak = -vy0 / g
  const tPeak = -vy0 / GRAVITY;
  // Fall distance from peak to landing
  const fallDist = landY - peakY;
  // Time from peak to landing: t_fall = sqrt(2 * fallDist / g)
  const tFall = Math.sqrt(Math.max(0, 2 * fallDist / GRAVITY));
  const totalTime = tPeak + tFall;
  // Horizontal velocity
  const vx0 = totalTime > 0 ? dx / totalTime : 0;
  return { cx, cy, landX, landY, vx: vx0, vy: vy0, totalTime };
}

function fireSnotRocket(chargeRatio) {
  const arc = calcSnotArc(chargeRatio);
  snotRocket = {
    x: arc.cx,
    y: arc.cy,
    vx: arc.vx,
    vy: arc.vy,
    landX: arc.landX,
    size: 10,
    trail: []
  };
}

function updateSnotRocket(dt) {
  if (!snotRocket) return;
  const s = snotRocket;
  s.x += s.vx * dt;
  s.y += s.vy * dt;
  s.vy += GRAVITY * dt; // standard gravity for consistent arc

  // Trail particles
  s.trail.push({ x: s.x, y: s.y, life: 0.3, maxLife: 0.3 });
  for (let i = s.trail.length - 1; i >= 0; i--) {
    s.trail[i].life -= dt;
    if (s.trail[i].life <= 0) s.trail.splice(i, 1);
  }

  // Off screen
  if (s.x < -50 || s.x > W + 50 || s.y > H + 50) {
    snotRocket = null;
    return;
  }

  // Hit platform (mortar always lands on floor — no mid-air enemy collision)
  if (s.y + s.size >= PLATFORM_Y) {
    snotAOEFreeze(s.x, PLATFORM_Y);
    snotRocket = null;
  }
}

function snotAOEFreeze(cx, cy) {
  // Freeze all enemies in radius
  for (const e of enemies) {
    if (e.dying) continue;
    const ecx = e.x + e.w / 2;
    const ecy = e.y + e.h / 2;
    const dist = Math.hypot(cx - ecx, cy - ecy);
    if (dist < SNOT_AOE_RADIUS) {
      e.freezeTimer = SNOT_FREEZE_DURATION;
    }
  }
  // Freeze boss (shorter duration)
  if (boss && bossActive && !boss.dying && boss.state !== 'entering') {
    const bcx = boss.x + boss.w / 2;
    const bcy = boss.y + boss.h / 2;
    const dist = Math.hypot(cx - bcx, cy - bcy);
    if (dist < SNOT_AOE_RADIUS) {
      boss.freezeTimer = SNOT_FREEZE_DURATION * 0.5;
    }
  }
  // Visual effects
  spawnParticles(cx, cy, '#88dd44', 25, 200, 0.6);
  spawnParticles(cx, cy, '#66bb22', 15, 150, 0.5);
  addShake(5, 0.15);
  // Splat ring
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    particles.push({
      x: cx + Math.cos(angle) * 15,
      y: cy + Math.sin(angle) * 15,
      vx: Math.cos(angle) * 180,
      vy: Math.sin(angle) * 180 - 40,
      life: 0.4, maxLife: 0.4,
      color: '#aaee44', size: 5
    });
  }
}

function updateFloatingPlatforms(dt) {
  if (gameState !== 'playing') return;

  // Spawn timer
  floatPlatSpawnTimer -= dt;
  if (floatPlatSpawnTimer <= 0 && floatingPlatforms.length < FLOAT_PLAT_MAX) {
    // Pick random unoccupied slot
    const available = [];
    for (let i = 0; i < FLOAT_PLAT_SLOTS.length; i++) {
      if (!occupiedSlots.has(i)) available.push(i);
    }
    if (available.length > 0) {
      const slotIdx = available[Math.floor(Math.random() * available.length)];
      const slot = FLOAT_PLAT_SLOTS[slotIdx];
      occupiedSlots.add(slotIdx);
      floatingPlatforms.push({
        x: slot.x, y: slot.y,
        w: FLOAT_PLAT_W, h: FLOAT_PLAT_H,
        lifetime: 0, maxLifetime: FLOAT_PLAT_LIFETIME + FLOAT_PLAT_WARN_TIME,
        phase: 'fadein', slotIndex: slotIdx,
        shakeOffset: 0, alpha: 0
      });
    }
    // Stagger: next spawn depends on how many are alive
    const count = floatingPlatforms.length;
    floatPlatSpawnTimer = FLOAT_PLAT_SPAWN_CD * (0.5 + 0.5 * count / FLOAT_PLAT_MAX);
  }

  // Update each platform
  for (let i = floatingPlatforms.length - 1; i >= 0; i--) {
    const fp = floatingPlatforms[i];
    fp.lifetime += dt;

    if (fp.phase === 'fadein') {
      fp.alpha = Math.min(1, fp.lifetime / FLOAT_PLAT_FADE_IN);
      if (fp.lifetime >= FLOAT_PLAT_FADE_IN) {
        fp.phase = 'solid';
        fp.alpha = 1;
        playSound('platAppear');
      }
    } else if (fp.phase === 'solid') {
      fp.alpha = 1;
      if (fp.lifetime >= FLOAT_PLAT_LIFETIME) {
        fp.phase = 'warning';
      }
    } else if (fp.phase === 'warning') {
      const warnProgress = (fp.lifetime - FLOAT_PLAT_LIFETIME) / FLOAT_PLAT_WARN_TIME;
      fp.alpha = 1;
      // Shake intensifies over warning period
      fp.shakeOffset = (Math.random() - 0.5) * warnProgress * 6;
      if (fp.lifetime >= FLOAT_PLAT_LIFETIME + FLOAT_PLAT_WARN_TIME) {
        fp.phase = 'gone';
      }
    }

    // Remove gone platforms
    if (fp.phase === 'gone') {
      // Crumble particles
      const theme = getTheme();
      spawnParticles(fp.x + fp.w / 2, fp.y + fp.h / 2, theme.platformColor, 12, 120, 0.5);
      spawnParticles(fp.x + fp.w / 2, fp.y + fp.h / 2, theme.platformHighlight, 6, 80, 0.4);
      playSound('platCrumble');
      occupiedSlots.delete(fp.slotIndex);
      floatingPlatforms.splice(i, 1);
    }
  }
}

function drawSnotRocket() {
  if (!snotRocket) return;
  const s = snotRocket;

  // Trail
  for (const t of s.trail) {
    const alpha = Math.max(0, t.life / t.maxLife) * 0.5;
    ctx.fillStyle = `rgba(120,200,50,${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Booger blob
  ctx.save();
  ctx.shadowColor = '#88dd44';
  ctx.shadowBlur = 12;

  // Main blob
  ctx.fillStyle = '#88cc22';
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = '#bbee66';
  ctx.beginPath();
  ctx.arc(s.x - 2, s.y - 2, s.size * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Drip blobs
  ctx.fillStyle = '#77bb11';
  ctx.beginPath();
  ctx.arc(s.x + s.size * 0.6, s.y + s.size * 0.4, s.size * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawSnotCharging() {
  if (!player.snotHolding) return;
  // Sniffling visual — green particles gathering at nose
  const cx = player.x + PLAYER_W / 2 + (player.facingRight ? 10 : -10);
  const cy = player.y + PLAYER_H * 0.35;
  const progress = Math.min(player.snotChargeTime / SNOT_MAX_CHARGE, 1);

  // Growing booger at nose
  const blobSize = 3 + progress * 6;
  ctx.fillStyle = '#88cc22';
  ctx.beginPath();
  ctx.arc(cx, cy, blobSize, 0, Math.PI * 2);
  ctx.fill();

  // Snot strands drawing in
  ctx.strokeStyle = `rgba(120,200,50,${0.3 + progress * 0.4})`;
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const angle = (performance.now() * 0.005 + i * 2.1);
    const dist = 25 * (1 - progress);
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist);
    ctx.lineTo(cx, cy);
    ctx.stroke();
  }

  // Arc preview
  drawSnotArcPreview(progress);
}

function drawSnotArcPreview(chargeRatio) {
  const arc = calcSnotArc(chargeRatio);
  const steps = 24;

  // Draw dotted parabolic path
  ctx.save();
  ctx.setLineDash([4, 6]);
  ctx.strokeStyle = 'rgba(136,204,34,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) * arc.totalTime;
    const px = arc.cx + arc.vx * t;
    const py = arc.cy + arc.vy * t + 0.5 * GRAVITY * t * t;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // AOE radius circle at landing point (translucent green)
  ctx.fillStyle = 'rgba(136,204,34,0.08)';
  ctx.beginPath();
  ctx.arc(arc.landX, PLATFORM_Y, SNOT_AOE_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(136,204,34,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(arc.landX, PLATFORM_Y, SNOT_AOE_RADIUS, 0, Math.PI * 2);
  ctx.stroke();

  // Crosshair at landing point
  const crossSize = 8;
  ctx.strokeStyle = 'rgba(136,204,34,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(arc.landX - crossSize, PLATFORM_Y);
  ctx.lineTo(arc.landX + crossSize, PLATFORM_Y);
  ctx.moveTo(arc.landX, PLATFORM_Y - crossSize);
  ctx.lineTo(arc.landX, PLATFORM_Y + crossSize);
  ctx.stroke();
  // Crosshair circle
  ctx.beginPath();
  ctx.arc(arc.landX, PLATFORM_Y, 5, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

// ============================================================
// ENEMIES
// ============================================================
let enemies = [];
let enemyProjectiles = [];

const ENEMY_TYPES = {
  grunt: {
    color: '#44cc44',
    eyeColor: '#ff0000',
    baseHp: 40,
    baseW: 32,
    baseH: 36,
    speed: 80,
    damage: 10,
    score: 100
  },
  spitter: {
    color: '#cc44cc',
    eyeColor: '#ffff00',
    baseHp: 30,
    baseW: 28,
    baseH: 32,
    speed: 50,
    damage: 8,
    score: 150,
    shootRange: 250,
    shootCooldown: 2.0,
    projectileSpeed: 200
  },
  brute: {
    color: '#cc6622',
    eyeColor: '#ff4444',
    baseHp: 120,
    baseW: 48,
    baseH: 52,
    speed: 120,
    damage: 25,
    score: 300,
    chargeSpeed: 300
  }
};

function getEnemySprite(type) {
  if (type === 'grunt' && gruntSpriteLoaded) return gruntSprite;
  if (type === 'spitter' && spitterSpriteLoaded) return spitterSprite;
  if (type === 'brute' && bruteSpriteLoaded) return bruteSprite;
  return null;
}

function createEnemy(type, round) {
  const def = ENEMY_TYPES[type];
  const hpBonus = (round - 1) * 15;
  const w = def.baseW;
  const h = def.baseH;
  const spawnX = PLATFORM_X + Math.random() * (PLATFORM_W - w);
  return {
    type,
    x: spawnX,
    y: -h - Math.random() * 200,
    w, h,
    vx: 0,
    vy: 0,
    hp: def.baseHp + hpBonus,
    maxHp: def.baseHp + hpBonus,
    speed: def.speed,
    damage: def.damage,
    score: def.score,
    color: def.color,
    eyeColor: def.eyeColor,
    onPlatform: false,
    dying: false,
    deathTimer: 0,
    flashTimer: 0,
    shootCooldown: def.shootCooldown || 0,
    shootTimer: (def.shootCooldown || 0) * Math.random(),
    charging: false,
    chargeTimer: 0,
    facingRight: Math.random() > 0.5,
    animTimer: Math.random() * Math.PI * 2,
    freezeTimer: 0
  };
}

function spawnEnemyForRound(round) {
  let type = 'grunt';
  if (round >= 5 && Math.random() < 0.25) {
    type = 'brute';
  } else if (round >= 3 && Math.random() < 0.35) {
    type = 'spitter';
  }
  enemies.push(createEnemy(type, round));
}

function updateEnemies(dt) {
  const pcx = player.x + PLAYER_W / 2;
  const pcy = player.y + PLAYER_H / 2;

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.animTimer += dt * 3;
    e.flashTimer = Math.max(0, e.flashTimer - dt);

    if (e.dying) {
      e.deathTimer -= dt;
      if (e.deathTimer <= 0) {
        enemies.splice(i, 1);
      }
      continue;
    }

    // Freeze timer
    if (e.freezeTimer > 0) {
      e.freezeTimer -= dt;
      // Still apply gravity/platform when frozen (so they don't float)
      e.vy += GRAVITY * dt;
      e.y += e.vy * dt;
      if (e.y + e.h >= PLATFORM_Y && e.vy >= 0) {
        const ecx = e.x + e.w / 2;
        if (ecx > PLATFORM_X && ecx < PLATFORM_X + PLATFORM_W) {
          e.y = PLATFORM_Y - e.h;
          e.vy = 0;
          e.onPlatform = true;
        }
      }
      // Contact damage still applies while frozen
      continue;
    }

    // Gravity
    e.vy += GRAVITY * dt;
    e.y += e.vy * dt;

    // Platform landing
    if (e.y + e.h >= PLATFORM_Y && e.vy >= 0) {
      const ecx = e.x + e.w / 2;
      if (ecx > PLATFORM_X && ecx < PLATFORM_X + PLATFORM_W) {
        e.y = PLATFORM_Y - e.h;
        e.vy = 0;
        e.onPlatform = true;
      }
    }

    // Fall off screen
    if (e.y > H + 200) {
      enemies.splice(i, 1);
      continue;
    }

    if (!e.onPlatform) continue;

    // AI behavior
    const dx = pcx - (e.x + e.w / 2);
    const dist = Math.abs(dx);
    e.facingRight = dx > 0;

    switch (e.type) {
      case 'grunt':
        e.vx = Math.sign(dx) * e.speed;
        e.x += e.vx * dt;
        break;

      case 'spitter': {
        const def = ENEMY_TYPES.spitter;
        if (dist > def.shootRange) {
          e.vx = Math.sign(dx) * e.speed;
          e.x += e.vx * dt;
        } else {
          e.vx = 0;
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = def.shootCooldown;
            const angle = Math.atan2(pcy - (e.y + e.h / 2), pcx - (e.x + e.w / 2));
            enemyProjectiles.push({
              x: e.x + e.w / 2,
              y: e.y + e.h / 2,
              vx: Math.cos(angle) * def.projectileSpeed,
              vy: Math.sin(angle) * def.projectileSpeed,
              damage: 15,
              life: 3,
              color: '#ff44ff'
            });
            playSound('spitterShoot');
          }
        }
        break;
      }

      case 'brute': {
        const def = ENEMY_TYPES.brute;
        if (!e.charging && dist < 200) {
          e.charging = true;
          e.chargeTimer = 0.3; // Wind-up
        }
        if (e.charging) {
          e.chargeTimer -= dt;
          if (e.chargeTimer <= 0) {
            e.vx = Math.sign(dx) * def.chargeSpeed;
          } else {
            e.vx = 0; // Wind-up pause
          }
        } else {
          e.vx = Math.sign(dx) * e.speed * 0.6;
        }
        e.x += e.vx * dt;
        // Reset charge if far away
        if (dist > 300) e.charging = false;
        break;
      }
    }

    // Clamp to platform
    if (e.x < PLATFORM_X) { e.x = PLATFORM_X; }
    if (e.x + e.w > PLATFORM_X + PLATFORM_W) { e.x = PLATFORM_X + PLATFORM_W - e.w; }

    // Contact damage to player
    if (player.iframes <= 0 && !e.dying) {
      if (rectsOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
        if (player.metalTimer > 0) {
          // Metal mode: bounce enemies away instead
          const knockDir = Math.sign(e.x + e.w / 2 - (player.x + PLAYER_W / 2));
          e.vx = knockDir * 400;
          e.vy = -250;
          damageEnemy(i, 40, knockDir * 400, -250);
          spawnParticles(player.x + PLAYER_W / 2, player.y + PLAYER_H / 2, '#aaccff', 6, 120, 0.3);
          playSound('hit');
        } else {
          const knockDir = Math.sign(player.x + PLAYER_W / 2 - (e.x + e.w / 2));
          player.hp -= e.damage;
          player.iframes = IFRAME_DURATION;
          player.vx = knockDir * CONTACT_KNOCKBACK;
          player.vy = -200;
          player.flashTimer = 0.15;
          spawnDamageNumber(player.x + PLAYER_W / 2, player.y, e.damage, '#ff4444');
          addShake(6, 0.15);
          playSound('hurt');
          if (Math.random() < 0.3) playVoice('bad');
        }
      }
    }

    // Muscle mode AoE slam
    if (player.muscleTimer > 0 && player.slamCooldown <= 0 && !e.dying) {
      const ecx = e.x + e.w / 2;
      const ecy = e.y + e.h / 2;
      const slamDist = Math.hypot(ecx - pcx, ecy - pcy);
      if (slamDist < 60) {
        const knockDir = Math.sign(ecx - pcx) || 1;
        damageEnemy(i, 30, knockDir * 400, -300);
        // Shockwave ring particles
        for (let s = 0; s < 8; s++) {
          const angle = (s / 8) * Math.PI * 2;
          particles.push({
            x: pcx + Math.cos(angle) * 20,
            y: pcy + Math.sin(angle) * 20,
            vx: Math.cos(angle) * 200,
            vy: Math.sin(angle) * 200 - 50,
            life: 0.3,
            maxLife: 0.3,
            color: '#cc66ff',
            size: 4
          });
        }
        spawnParticles(ecx, ecy, '#dd88ff', 6, 120, 0.3);
        addShake(5, 0.12);
        playSound('slam');
        player.slamCooldown = 0.4;
      }
    }
  }

  // Enemy projectiles
  for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
    const p = enemyProjectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    if (p.life <= 0 || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) {
      enemyProjectiles.splice(i, 1);
      continue;
    }

    // Hit player
    if (player.iframes <= 0) {
      const dist = Math.hypot(p.x - (player.x + PLAYER_W / 2), p.y - (player.y + PLAYER_H / 2));
      if (dist < 24) {
        if (player.metalTimer > 0) {
          // Deflect projectile
          spawnParticles(p.x, p.y, '#aaccff', 5, 80, 0.2);
          playSound('hit');
        } else {
          player.hp -= p.damage;
          player.iframes = IFRAME_DURATION;
          player.flashTimer = 0.15;
          spawnDamageNumber(player.x + PLAYER_W / 2, player.y, p.damage, '#ff44ff');
          spawnParticles(p.x, p.y, '#ff44ff', 8, 80, 0.3);
          addShake(4, 0.1);
          playSound('hurt');
          if (Math.random() < 0.3) playVoice('bad');
        }
        enemyProjectiles.splice(i, 1);
      }
    }
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.dying) {
      // Death fade
      ctx.globalAlpha = Math.max(0, e.deathTimer / 0.4);
    }

    const cx = e.x + e.w / 2;
    const cy = e.y + e.h / 2;

    const spr = getEnemySprite(e.type);
    if (spr) {
      // --- Sprite-based drawing ---
      ctx.save();
      if (!e.facingRight) {
        ctx.translate(cx, cy);
        ctx.scale(-1, 1);
        ctx.translate(-cx, -cy);
      }
      // Aspect-ratio preservation, feet-aligned
      let drawW = e.w;
      let drawH = e.h;
      if (spr.naturalWidth && spr.naturalHeight) {
        const ratio = spr.naturalWidth / spr.naturalHeight;
        drawW = e.h * ratio;
      }
      const drawX = cx - drawW / 2;
      const drawY = e.y + e.h - drawH; // feet aligned
      ctx.drawImage(spr, drawX, drawY, drawW, drawH);

      // Flash white on hit
      if (e.flashTimer > 0) {
        ctx.globalCompositeOperation = 'source-atop';
        ctx.fillStyle = `rgba(255,255,255,${e.flashTimer * 5})`;
        ctx.fillRect(drawX, drawY, drawW, drawH);
      }
      ctx.restore();
    } else {
      // --- Procedural fallback ---
      ctx.fillStyle = e.flashTimer > 0 ? '#ffffff' : e.color;
      ctx.beginPath();
      ctx.ellipse(cx, cy + e.h * 0.1, e.w / 2, e.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();

      if (!e.dying) {
        // Eyes
        ctx.fillStyle = e.eyeColor;
        const eyeOff = e.facingRight ? e.w * 0.1 : -e.w * 0.1;
        const eyeSize = Math.max(2, e.w * 0.1);
        ctx.fillRect(cx + eyeOff - eyeSize * 1.2, cy - e.h * 0.15, eyeSize, eyeSize);
        ctx.fillRect(cx + eyeOff + eyeSize * 0.3, cy - e.h * 0.15, eyeSize, eyeSize);

        // Mouth
        ctx.fillStyle = '#000';
        ctx.fillRect(cx + eyeOff - eyeSize, cy + e.h * 0.05, eyeSize * 2, eyeSize * 0.5);

        // Walking animation (bouncing legs)
        if (e.onPlatform && Math.abs(e.vx) > 1) {
          ctx.fillStyle = e.color;
          const legBob = Math.sin(e.animTimer * 5) * 3;
          ctx.fillRect(cx - e.w * 0.25, e.y + e.h - 4 + legBob, e.w * 0.15, 6);
          ctx.fillRect(cx + e.w * 0.1, e.y + e.h - 4 - legBob, e.w * 0.15, 6);
        }
      }
    }

    // Overlays drawn on top regardless of sprite/procedural
    if (!e.dying) {
      // HP bar
      if (e.hp < e.maxHp) {
        const barW = e.w;
        const barH = 4;
        ctx.fillStyle = '#440000';
        ctx.fillRect(e.x, e.y - 8, barW, barH);
        ctx.fillStyle = '#ff2222';
        ctx.fillRect(e.x, e.y - 8, barW * (e.hp / e.maxHp), barH);
      }

      // Brute charge indicator
      if (e.type === 'brute' && e.charging && e.chargeTimer > 0) {
        ctx.fillStyle = `rgba(255,0,0,${0.5 + Math.sin(performance.now() * 0.02) * 0.5})`;
        ctx.beginPath();
        ctx.arc(cx, cy, e.w * 0.7, 0, Math.PI * 2);
        ctx.fill();
      }

      // Freeze visual
      if (e.freezeTimer > 0) {
        ctx.fillStyle = `rgba(100,200,40,${0.3 + 0.1 * Math.sin(performance.now() * 0.005)})`;
        ctx.beginPath();
        ctx.ellipse(cx, cy + e.h * 0.1, e.w / 2 + 2, e.h / 2 + 2, 0, 0, Math.PI * 2);
        ctx.fill();
        const dripPhase = performance.now() * 0.003;
        ctx.fillStyle = '#88cc22';
        for (let b = 0; b < 3; b++) {
          const bx = cx + (b - 1) * e.w * 0.3;
          const by = cy + e.h * 0.3 + Math.sin(dripPhase + b * 1.5) * 3;
          ctx.beginPath();
          ctx.arc(bx, by, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    ctx.globalAlpha = 1;
  }

  // Enemy projectiles
  for (const p of enemyProjectiles) {
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function damageEnemy(index, damage, knockX, knockY) {
  const e = enemies[index];
  if (e.dying) return;
  e.hp -= damage;
  e.flashTimer = 0.1;
  e.vx += knockX;
  e.vy += knockY;

  spawnDamageNumber(e.x + e.w / 2, e.y, damage, '#ffff44');
  playSound('hit');

  if (e.hp <= 0) {
    e.dying = true;
    e.deathTimer = 0.4;
    score += e.score;
    spawnParticles(e.x + e.w / 2, e.y + e.h / 2, e.color, 15, 200, 0.5);
    addShake(4, 0.1);
    playSound('kill');
    playNoise(0.15, 0.15);
    if (Math.random() < 0.25) {
      playVoice(goodClipToggle ? 'good1' : 'good2');
      goodClipToggle = !goodClipToggle;
    }
  }
}
