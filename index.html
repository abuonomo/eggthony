<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #000;
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  user-select: none;
  -webkit-user-select: none;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
}
canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor: none;
  touch-action: none;
}
@media (pointer: coarse) {
  canvas { cursor: default; }
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="nameOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events:none;">
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.92); border:2px solid #ffcc00; border-radius:8px; padding:20px 24px; text-align:center; pointer-events:auto; font-family:monospace;">
    <div style="color:#ffcc00; font-size:18px; font-weight:bold; margin-bottom:12px;">ENTER YOUR NAME</div>
    <input id="nameInput" type="text" maxlength="16" autocomplete="off" spellcheck="false"
      style="background:#111; color:#fff; border:1px solid #ffcc00; font-family:monospace; font-size:18px; padding:8px 12px; width:200px; text-align:center; outline:none; border-radius:4px;">
    <div style="margin-top:14px; display:flex; gap:12px; justify-content:center;">
      <button id="nameSubmit" style="background:#ffcc00; color:#000; border:none; font-family:monospace; font-size:16px; font-weight:bold; padding:8px 20px; cursor:pointer; border-radius:4px;">SUBMIT</button>
      <button id="nameSkip" style="background:none; color:#888; border:1px solid #555; font-family:monospace; font-size:14px; padding:8px 16px; cursor:pointer; border-radius:4px;">Skip</button>
    </div>
  </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
